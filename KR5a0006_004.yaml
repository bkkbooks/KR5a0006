front:
  text: 上清大洞眞經卷之四荒八
  hash: sha256:7abefb1ef67c41fa6be8e1ecc495cb9995359b753ce9cff19b7886d16364a12d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0006_HFL_004-001a, image: hfl/0017/0017-046.png}
body:
  text: 茅山上清三十八代宗師蔣宗瑛校勘皇初紫靈元君道經第十七精血三眞章謹請精血三眞元生君字黄寧子玄常守兆鼻兩孔之下源死炁之門使兆精神宣暢於百節血液盈滿於十關萬靈之炁輔護太一之䰟保身眞思精血中三眞元生君眞炁赤雲之色罩於頂上乃黙呪曰三眞煥光流丹徘徊離合九景玉洞金屝上招朱皇五苦廓開死根斷落日䰟同飛超逸十界上昇玉階次思赤炁從兆泥丸中入兆乃口吸神雲咽津三過結作三神赤衣冠下布絳宫入兩膀胱運下元精血纒遶神身入尾閭穴穿骨髓上入泥丸下布鼻凹岀赤血化爲一輪赤光神在光内前去身五丈順時吐息誦玉經大洞玉經曰皇初炁紫元色中暉光鬰霄明三天煥九景離合億萬生披朱巾緑霞上回寒童靈月名拔出五苦毒超身過始青東方天白素啓蕭刅右元君名金門衞朱兵七世積尸結一化百散傾受福東霞室反胎朱火庭上清紫元王祝曰七炁混合帝一徊元結滯月散兆命長遷死道門滅斷絶胞根五藏生華六府金鮮帝一保形司命保神五符啓䨾五籍登仙世爲道王帝師纒綿散香龍䆫反華揚烟七擕無上八暉九陳流源迴液領會六淵元君宫名名書上清炁積寂軒徊風脫死帝一相連五通七合俱生上元畢乃口微祝曰天上内音發遷合光運長地上外音常生天入寳炁大洞精血三眞元生君消魔玉符訣曰當朱書黄繒佩之存呼元生君内諱名字鎭我鼻孔之下爲我通太眞之户固死炁於九門乃叩齒三通咽液三過無英中眞上老君道經第十八胃脘二眞章謹請胃脘二眞堅玉君字凝羽珠常守兆太倉之腑五腸之口死炁之門使黄庭香潔三尸㓕絶中元之炁常滿帝皇之光鬱鬰上衝泥丸敷散骨節眞思胃脘中二眞堅玉君眞炁碧雲之色𦋇於頂上乃黙呪曰二眞固神鬱勃三關徊金合玉堅備泥丸上通帝炁布流金門混化啓明合我仙䰟七祖同飛滅絶胞根世保道德永享欣欣次思碧炁從兆泥丸中入兆乃口吸神雲咽津二過結作二神狀如二帝青衣冠下布太倉之腑五腸之口神面相向立順時吐息誦玉經太洞玉經曰無英神名眞上玄玄充神名元素炁寄頻斗中太一擕運珠心神混化啓明日正一左右仙人中神長挾林神名虚室兆有五符籍合仙得眞契䰟生太無中魄亦五道會世世解死尸七祖無住滯神風吹胞𣗳根葉已斷絶胞中種鬼殃五符開地結長爲神眞王應仙續萬世髙上神霄玉清王祝曰䰟生旡中布在九重道出三極常遊絳宫三宫合化是爲紫房紫房所在先由明堂眉間一中明堂之内守神桃康神名風雲鬱鬱旣清且涼塞閉欲孔割破戀根其聖曰𠾳大道君名其眞曰霐兆能知之乃開金門金門左右忽見髙賢左曰父寧在帝一名右曰母帝一字精延此是景中伯與爾登玉晨父寧母精世世爲仙萬條重華皆受帝恩畢乃口微祝曰天上内音彌劫連大生章地上外音反老童受年祚大洞胃脘二眞堅玉君消魔玉符訣曰當朱書黄繒佩之存呼堅玉君内諱名字鎭我太倉之腑使兆黄庭保固死炁滅絶内胎合秀長對神室乃叩齒三通咽液二過中央黄老君道經第十九心中一眞章謹請心中一眞天精液君字飛生上英常守兆胷中四極之口死炁之門使兆五藏生華光四關受眞炁紫液流滿於胷中百神結成於絳宫羽衣虎裙上昇玉天眞思心中一眞天精液君眞炁絳宫之色罩於頂上黙呪曰一眞鎭心緫領百神百神常生㑹我絳軒上招玉光六液沉珍赤景啓靈拔我七根超逸三塗上昇南仙次思絳雲從兆泥丸中入兆乃口吸神雲咽津三過結作一神狀如帝王朱衣冠下布胷間四極之口化爲一輪百寳神光神在光内順時吐息誦玉經大洞玉經曰中央黄老君黄素炁圎華官名玉壽靈山名太張黄素字上玉門伏雲三刅三素字明赤景翳逸寥月中夫人名揚輝中女名太一精帝女抱定陵斗中中玄字吟咏玉清經五籍編紫房五符入圎庭七祖反胎宅㓕絶三塗生流風斷血滯玄葉得黃寜髙上神霄玉清王祝曰帝一徊風化合桃康流生起福上溢玉胷堂混而合之岀入帝房三五三真五老合一必成仙王七玄父母滅尸散𡨚萬劫千重皆登上仙曲莭伏扈廣敷鬱申守我形者司命丈人帝君九炁君公子肝中深固泥洹太微玉帝玉華羽服揚旛䰟魄長相抱百骨皆滿神神王生津上超越度死門遂友髙上子玉帝旛挹待玉清賔畢乃口微祝曰天上内音滿景生比孛通地上外音解脫灾福劫元大洞心中一眞天精液君消魔玉符訣曰當朱書黄繒佩之存呼天精液君内諱名字鎭我胷中四極之口使神安室宅死炁消魔五藏光華百神寧和乃叩齒九通咽液九過青精上眞内景君道經第二十九元之眞章謹請九元之眞男名拘制字三陽常守兆左耳之下伏晨之戸死炁之門使兆天聦發徹幽谷鮮明眞炁雲行徃來泥丸眞思九元之眞拘制眞炁五色之雲罩於頂上乃黙呪曰九元之精天關開聦八景合炁上通金房三元帝室反老生蓊玉華灌漑錬改芝容飛霄紫轝運我昇空次思五色雲炁從兆泥丸中入兆乃口吸神雲咽津三過結作三神狀如神將身披金甲各執兵仗下布絳宫入左膀胱穿尾閭穴入脊髓上過第一椎耳後過入左耳之下伏晨之戸神去身五丈順時吐息誦玉經大洞玉經曰青精常名上華炁太微玄景童内景君神化玉室内飛羽室名逸紫空山名曰爲三衿太微别名交奉符登帝墉開關三關把金節閉戸叩瓊鍾滅魔三鄷賢宫野招靈上清宫明出窮關下關隂入精六合房眉後回光變皓彩還白反嬰蒙玉清内景王祝曰寂寂上伯心神接方左手神生盈右手神心中之神號曰天精元精演君流煥九宫飛生上英拔絶死門福臻鏘鏘七世父母結解吉昌符籍登晨堂名身併桃康長保金暉道德仙王太微小童常在帝前其名景精其姓曰干合形太一被服朱丹五符命籍把持玉案帝君所臨主通諸神混合太一司命丈人固保靈戸五藏㑹分帝先守宅凶種滅根三炁鬱敷八回五烟我得升霄駕龍明軒畢乃口微祝曰天上内音種炁㑹出蘭蒙地上外音昌田子東壽王大洞九元之眞男拘制消魔玉符訣曰當青書黄繒佩之存呼九元内諱名字鎭我左耳之下使兆聰明八逹寤響萬里太眞保生震靈鎭死乃叩齒十二通咽液十二過太陽九炁玉賢元君道經第二十一皇一之䰟章謹請皇一之䰟女名上歸字帝子常守兆右耳之下伏晨之戸死炁之門使兆幽明之光上朗泥丸太元之音獨樂一身彈金鳴鍾流徹太和眞思皇一之䰟上歸眞炁玄雲之色𦋇於頂上乃黙呪曰皇一上眞洞生丹房朱嬰榮曜發溢明光太元之音朗徹九空玄金獨樂振響琅琅上招玉景恊我神堂䇿虚升飛遊宴玉京次思玄雲之炁從兆泥丸中入兆乃口吸神雲咽津三過結作三神狀如神將身披金甲各執兵杖下布絳宫入右膀胱穿尾閭穴上入脊髓上過第一椎耳後過入右耳之下伏晨之戸神去身五丈順時吐息誦玉經大洞玉經曰太陽化三神紫軿微玄下日神名元君保谷童胃神守胃塞鬼戸金符煥北華玉契拔七祖帝眞觀上生精䰟字斷我三塗苦司命血中君攝生太一胎中君營神開隂太漠長保陽源素明童子肺中神正我三䰟列籙玉清羽書紫玄月帝夫人運翹結賢奉符六合混㑹億千累爲仙王上宴九天玉清太素元景王祝曰九宫一合化形帝晨上昇紫房命眞召仙㑹濟䰟魄領括百神七玄康樂拔苦破根死焰滅炁福禄充軒兆登太霄駕景控雲日中五帝挾日精輪鬱將日帝名逸阜飈景同遷畢乃口微祝曰天上内音㑹命初幽中和地上外音混生宗理仙樞太洞皇一之䰟上歸消魔玉符訣曰當黄書青繒佩之存呼皇一内諱名字鎭我右耳之下使我萬炁通暢玉清開生死炁鎭塞九孔受靈乃叩齒十二通咽液十二過太初九素金華景元君道經第二十二紫素左元君章謹請紫素左元君翳鬱無刅字安來上常守兆頭面之境使萬邪不侵千精盡滅紫炁充於泥丸太素鎭於鼻孔景雲披於口齒玉林藂於髮膚散七世之積尸解七祖之罪仇上生天帝堂反眞更受胎眞思紫素左元君翳鬱無刅眞炁景雲之色𦋇於頂上乃黙呪曰翳鬱生眞炁眞生空靈光昱昱紫素融融上致流津下布我宫身生水火體變玉光飛仙羽蓋升入神公受書玉京成我仙宗次思景雲之炁從兆泥丸中入兆乃口吸神雲咽津三過結作一神狀如帝王下入絳宫穿尾閭穴上入泥丸下布玄逹之戸存神吐萬道景霞之雲𦋇於頭面之境順時吐息誦玉經大洞玉經曰太初天名九素炁炁出華景宫名中法坦斗中太一名舞仙旗逡巡五老翁夫人名啓朱斗中夫人名執籍歸紫房元父左回明元父字混㑹太微童髙上左晨玉清王祝曰慶元吉津流汨西田大帝擕手命召髙仙披散積穢斷絶死根上一天帝號玄凝天上一赤子名曜明六合靜寂泥丸是爲伯無上神名使兆保長安列圖玉皇併襟帝晨五府生華六液龍源淵清太素鬱藹金津萬仙來朝五嶽啓陳玄𠎝沉散天福奏烟彫梁青帝名守命戸長來護死門上生玉房受位金仙天之玉堂常接帝賢九天之中宴盻劫年畢乃口微祝曰天上内音㝠冲次信明都地上外音延命玉駕本根大洞紫素左元君消魔玉符訣曰當黄書青繒佩之存呼左元君内諱名字鎭我頭面之境使兆五藏生眞玉華玄映保固三炁神歡靈暢乃叩齒九通咽液九過九皇上眞司命道君道經第二十三黄素中元君章謹請黄素中元君圎華黄刅字太張上常守兆胷腹之境使鬼魔伏制三尸滅形黄雲散於肢體金液充於太倉晨景之暉上華太眞之炁運光俾七祖父母釋罪而受胎更生於南宫眞思黄素中元君圎華黄刅眞炁晨景之色𦋇於頂上乃黙呪曰九天上景化生華暉晃太空曜眞紫微上致中皇百神降迴散根離苦八難豁開七祖同昇福慶巍巍使我神仙八景齊飛次思景暉之炁從兆泥丸中入兆乃口吸神雲咽津二過結作二神狀如神將身披金甲下布庚辛之位化爲兩輪黄光神在光内順時吐息誦玉經大洞玉經曰九皇斗眞上眞炁四司四司命太仙宫飛霞天上山名散天日麗煥六合房上眞朝玉清乗景晨暉中五神號發紐司命名捧籍啓虚皇逸籙登紫清金符刻羽宫髙上神霄玉清王祝曰大帝精䰟陽堂八靈披散四炁混合衆生九真尊名帝一承圖三元㑹明九眞安安七神寧寧超越滯節過度鬼兵上昇帝晨盻樂玉庭玄母定籙五符開清胞根滅種血穢殄平七祖父母超詣三清無英明夫无英别名掌我仙經廣神安炁天紀帝名緑迴絶冥九明䰟名閉藏死關太一混生長寢羽臺上固神五老室受籙上清闕保德七元日上上登玉宵下下合帝一畢乃口微祝曰天上内音掌堂逮元眇靈地上外音大劫迴末始交大洞黄素中元君消魔玉符訣曰當朱書青繒佩之存呼中元君内諱名字鎭我胷腹之境使死炁絶滅五内生眞七祖騰飛更受胎仙神安炁朗超登帝晨乃叩齒三通咽液三過太皇上眞玉華三元君道經第二十四白素右元君章謹請白素右元君啓明蕭刅字金門上常守兆下關之境從小腹至脚底使三積之宿穢無滯地戸之土鬼沉滅明玉之液上淘於極隂之宫素金之炁逆衝於兩腕之内髀受九靈之潤脚生重玄之雲累祖解於㝠罪七世散於旤根更生南宫上宴帝軒眞思白素右元君啓明蕭刅眞炁月光玄雲之色𦋇於頂上乃黙呪曰白素啓明九天同生髙虚素轡浮景玉清回眞曲仙流灑八溟通幽逹微朗耀華精使我内徹五孔開明神公來遊我道克成次思月華之炁從兆泥丸中入兆乃口吸神雲咽津六過結作六神狀如力士下入絳宫穿小腹二欲孔兩膀胱下布下關之境至兩脚心出去身五丈乗玄雲順時吐息誦玉經大洞玉經曰天皇上眞炁三元乗神回法坦興朱霄帝昌泥丸神名啓玉扉拔尸命門内解結桃康階歛神保五籍越轉入太微三五混一六液精合平公子無英奉符司心神命保生紫房洞耀泥丸安寧百關備仙五華飛冥雲飈流逸八景浮清併羽大帝擕帶寒庭月中沉殃天津絶滅胞莖七世累玄解結南庭朱陵太微玉清帝君祝曰䰟生九炁炁變成神五老纏㑹太一化仙二十四眞徊形帝先九曲下戸鎭生白雲黄庭六府含養命根胎結胞樹種㘽死山一得拘制受斷滅源符籍清明金映玉軒長爲德伯世得道恩昇登日月遂友帝先畢乃口微祝曰天上内音保解乗結六庭地上外音生雙門入仙胎大洞白素右元君消魔玉符訣曰當青書黄繒佩之存呼右元君内諱名字鎭我下關之境使三眞固䰟九靈制魄萬神總歸安鎭室宅七祖解散名言仙籍乃叩齒三通咽液三過上清大洞眞經卷之四
