front:
  text: 上清大洞真經卷之四荒八
  hash: sha256:77c39d19cca3d69dc8bda9cf7efe5bf12cd6bfbdef1934b079b589a52feb3f21
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0006_HFL_004-001a, image: hfl/0017/0017-046.png}
body:
  text: 茅山上清三十八代宗師蔣宗瑛校勘皇初紫靈元君道經第十七精血三真章謹請精血三真元生君字黃寧子玄常守兆鼻兩孔之下源死氣之門使兆精神宣暢於百節血液盈滿於十關萬靈之氣輔護太一之魂保身真思精血中三真元生君真氣赤雲之色罩於頂上乃默呪曰三真煥光流丹徘徊離合九景玉洞金屝上招朱皇五苦廓開死根斷落日魂同飛超逸十界上升玉階次思赤氣從兆泥丸中入兆乃口吸神雲咽津三過結作三神赤衣冠下布絳宫入兩膀胱運下元精血纒繞神身入尾閭穴穿骨髓上入泥丸下布鼻凹出赤血化為一輪赤光神在光內前去身五丈順時吐息誦玉經大洞玉經曰皇初氣紫元色中暉光鬱霄明三天煥九景離合億萬生披朱巾緑霞上回寒童靈月名拔出五苦毒超身過始青東方天白素啓蕭創右元君名金門衛朱兵七世積尸結一化百散傾受福東霞室反胎朱火庭上清紫元王祝曰七氣混合帝一徊元結滯月散兆命長遷死道門滅斷絶胞根五藏生華六府金鮮帝一保形司命保神五符啓䨾五籍登仙世為道王帝師纒綿散香龍窗反華揚烟七擕無上八暉九陳流源回液領會六淵元君宫名名書上清氣積寂軒徊風脫死帝一相連五通七合俱生上元畢乃口微祝曰天上內音發遷合光運長地上外音常生天入寶氣大洞精血三真元生君消魔玉符訣曰當朱書黃繒佩之存呼元生君內諱名字鎮我鼻孔之下為我通太真之户固死氣於九門乃叩齒三通咽液三過無英中真上老君道經第十八胃脘二真章謹請胃脘二真堅玉君字凝羽珠常守兆太倉之腑五腸之口死氣之門使黃庭香潔三尸滅絶中元之氣常滿帝皇之光鬱鬱上衝泥丸敷散骨節真思胃脘中二真堅玉君真氣碧雲之色𦋇於頂上乃默呪曰二真固神鬱勃三關徊金合玉堅備泥丸上通帝氣布流金門混化啓明合我仙魂七祖同飛滅絶胞根世保道德永享欣欣次思碧氣從兆泥丸中入兆乃口吸神雲咽津二過結作二神狀如二帝青衣冠下布太倉之腑五腸之口神面相向立順時吐息誦玉經太洞玉經曰無英神名真上玄玄充神名元素氣寄頻斗中太一擕運珠心神混化啓明日正一左右仙人中神長挾林神名虛室兆有五符籍合仙得真契魂生太無中魄亦五道會世世解死尸七祖無住滯神風吹胞𣗳根葉已斷絶胞中種鬼殃五符開地結長為神真王應仙續萬世髙上神霄玉清王祝曰魂生旡中布在九重道出三極常遊絳宫三宫合化是為紫房紫房所在先由明堂眉間一中明堂之內守神桃康神名風雲鬱鬱既清且涼塞閉欲孔割破戀根其聖曰𠾳大道君名其真曰霐兆能知之乃開金門金門左右忽見髙賢左曰父寧在帝一名右曰母帝一字精延此是景中伯與爾登玉晨父寧母精世世為仙萬條重華皆受帝恩畢乃口微祝曰天上內音彌劫連大生章地上外音反老童受年祚大洞胃脘二真堅玉君消魔玉符訣曰當朱書黃繒佩之存呼堅玉君內諱名字鎮我太倉之腑使兆黃庭保固死氣滅絶內胎合秀長對神室乃叩齒三通咽液二過中央黃老君道經第十九心中一真章謹請心中一真天精液君字飛生上英常守兆胸中四極之口死氣之門使兆五藏生華光四關受真氣紫液流滿於胸中百神結成於絳宫羽衣虎裙上升玉天真思心中一真天精液君真氣絳宫之色罩於頂上默呪曰一真鎮心總領百神百神常生㑹我絳軒上招玉光六液沉珍赤景啓靈拔我七根超逸三塗上升南仙次思絳雲從兆泥丸中入兆乃口吸神雲咽津三過結作一神狀如帝王朱衣冠下布胸間四極之口化為一輪百寶神光神在光內順時吐息誦玉經大洞玉經曰中央黃老君黃素氣圎華官名玉壽靈山名太張黃素字上玉門伏雲三創三素字明赤景翳逸寥月中夫人名揚輝中女名太一精帝女抱定陵斗中中玄字吟咏玉清經五籍編紫房五符入圎庭七祖反胎宅滅絶三塗生流風斷血滯玄葉得黃寧髙上神霄玉清王祝曰帝一徊風化合桃康流生起福上溢玉胸堂混而合之出入帝房三五三真五老合一必成仙王七玄父母滅尸散𡨚萬劫千重皆登上仙曲莭伏扈廣敷鬱申守我形者司命丈人帝君九氣君公子肝中深固泥洹太微玉帝玉華羽服揚幡魂魄長相抱百骨皆滿神神王生津上超越度死門遂友髙上子玉帝幡挹待玉清賔畢乃口微祝曰天上內音滿景生比孛通地上外音解脫灾福劫元大洞心中一真天精液君消魔玉符訣曰當朱書黃繒佩之存呼天精液君內諱名字鎮我胸中四極之口使神安室宅死氣消魔五藏光華百神寧和乃叩齒九通咽液九過青精上真內景君道經第二十九元之真章謹請九元之真男名拘制字三陽常守兆左耳之下伏晨之戶死氣之門使兆天聰發徹幽谷鮮明真氣雲行往來泥丸真思九元之真拘制真氣五色之雲罩於頂上乃默呪曰九元之精天關開聰八景合氣上通金房三元帝室反老生蓊玉華灌溉錬改芝容飛霄紫輿運我升空次思五色雲氣從兆泥丸中入兆乃口吸神雲咽津三過結作三神狀如神將身披金甲各執兵仗下布絳宫入左膀胱穿尾閭穴入脊髓上過第一椎耳後過入左耳之下伏晨之戶神去身五丈順時吐息誦玉經大洞玉經曰青精常名上華氣太微玄景童內景君神化玉室內飛羽室名逸紫空山名曰為三襟太微别名交奉符登帝墉開關三關把金節閉戶叩瓊鍾滅魔三鄷賢宫野招靈上清宫明出窮關下關隂入精六合房眉後回光變皓彩還白反嬰蒙玉清內景王祝曰寂寂上伯心神接方左手神生盈右手神心中之神號曰天精元精演君流煥九宫飛生上英拔絶死門福臻鏘鏘七世父母結解吉昌符籍登晨堂名身併桃康長保金暉道德仙王太微小童常在帝前其名景精其姓曰干合形太一被服朱丹五符命籍把持玉案帝君所臨主通諸神混合太一司命丈人固保靈戶五藏㑹分帝先守宅凶種滅根三氣鬱敷八回五烟我得升霄駕龍明軒畢乃口微祝曰天上內音種氣㑹出蘭蒙地上外音昌田子東壽王大洞九元之真男拘制消魔玉符訣曰當青書黃繒佩之存呼九元內諱名字鎮我左耳之下使兆聰明八逹寤響萬里太真保生震靈鎮死乃叩齒十二通咽液十二過太陽九氣玉賢元君道經第二十一皇一之魂章謹請皇一之魂女名上歸字帝子常守兆右耳之下伏晨之戶死氣之門使兆幽明之光上朗泥丸太元之音獨樂一身彈金鳴鍾流徹太和真思皇一之魂上歸真氣玄雲之色𦋇於頂上乃默呪曰皇一上真洞生丹房朱嬰榮曜發溢明光太元之音朗徹九空玄金獨樂振響琅琅上招玉景協我神堂䇿虛升飛遊宴玉京次思玄雲之氣從兆泥丸中入兆乃口吸神雲咽津三過結作三神狀如神將身披金甲各執兵杖下布絳宫入右膀胱穿尾閭穴上入脊髓上過第一椎耳後過入右耳之下伏晨之戶神去身五丈順時吐息誦玉經大洞玉經曰太陽化三神紫軿微玄下日神名元君保谷童胃神守胃塞鬼戶金符煥北華玉契拔七祖帝真觀上生精魂字斷我三塗苦司命血中君攝生太一胎中君營神開隂太漠長保陽源素明童子肺中神正我三魂列籙玉清羽書紫玄月帝夫人運翹結賢奉符六合混㑹億千纍為仙王上宴九天玉清太素元景王祝曰九宫一合化形帝晨上升紫房命真召仙㑹濟魂魄領括百神七玄康樂拔苦破根死焰滅氣福祿充軒兆登太霄駕景控雲日中五帝挾日精輪鬱將日帝名逸阜飈景同遷畢乃口微祝曰天上內音㑹命初幽中和地上外音混生宗理仙樞太洞皇一之魂上歸消魔玉符訣曰當黃書青繒佩之存呼皇一內諱名字鎮我右耳之下使我萬氣通暢玉清開生死氣鎮塞九孔受靈乃叩齒十二通咽液十二過太初九素金華景元君道經第二十二紫素左元君章謹請紫素左元君翳鬱無創字安來上常守兆頭面之境使萬邪不侵千精盡滅紫氣充於泥丸太素鎮於鼻孔景雲披於口齒玉林藂於髮膚散七世之積尸解七祖之罪仇上生天帝堂反真更受胎真思紫素左元君翳鬱無創真氣景雲之色𦋇於頂上乃默呪曰翳鬱生真氣真生空靈光昱昱紫素融融上致流津下布我宫身生水火體變玉光飛仙羽蓋升入神公受書玉京成我仙宗次思景雲之氣從兆泥丸中入兆乃口吸神雲咽津三過結作一神狀如帝王下入絳宫穿尾閭穴上入泥丸下布玄逹之戶存神吐萬道景霞之雲𦋇於頭面之境順時吐息誦玉經大洞玉經曰太初天名九素氣氣出華景宫名中法坦斗中太一名舞仙旗逡巡五老翁夫人名啓朱斗中夫人名執籍歸紫房元父左回明元父字混㑹太微童髙上左晨玉清王祝曰慶元吉津流汨西田大帝擕手命召髙仙披散積穢斷絶死根上一天帝號玄凝天上一赤子名曜明六合靜寂泥丸是為伯無上神名使兆保長安列圖玉皇併襟帝晨五府生華六液龍源淵清太素鬱藹金津萬仙來朝五嶽啓陳玄𠎝沉散天福奏烟雕梁青帝名守命戶長來護死門上生玉房受位金仙天之玉堂常接帝賢九天之中宴盻劫年畢乃口微祝曰天上內音冥冲次信明都地上外音延命玉駕本根大洞紫素左元君消魔玉符訣曰當黃書青繒佩之存呼左元君內諱名字鎮我頭面之境使兆五藏生真玉華玄映保固三氣神歡靈暢乃叩齒九通咽液九過九皇上真司命道君道經第二十三黃素中元君章謹請黃素中元君圎華黃創字太張上常守兆胸腹之境使鬼魔伏制三尸滅形黃雲散於肢體金液充於太倉晨景之暉上華太真之氣運光俾七祖父母釋罪而受胎更生於南宫真思黃素中元君圎華黃創真氣晨景之色𦋇於頂上乃默呪曰九天上景化生華暉晃太空曜真紫微上致中皇百神降回散根離苦八難豁開七祖同升福慶巍巍使我神仙八景齊飛次思景暉之氣從兆泥丸中入兆乃口吸神雲咽津二過結作二神狀如神將身披金甲下布庚辛之位化為兩輪黃光神在光內順時吐息誦玉經大洞玉經曰九皇斗真上真氣四司四司命太仙宫飛霞天上山名散天日麗煥六合房上真朝玉清乘景晨暉中五神號發紐司命名捧籍啓虛皇逸籙登紫清金符刻羽宫髙上神霄玉清王祝曰大帝精魂陽堂八靈披散四氣混合衆生九真尊名帝一承圖三元㑹明九真安安七神寧寧超越滯節過度鬼兵上升帝晨盻樂玉庭玄母定籙五符開清胞根滅種血穢殄平七祖父母超詣三清無英明夫無英别名掌我仙經廣神安氣天紀帝名緑回絶冥九明魂名閉藏死關太一混生長寢羽臺上固神五老室受籙上清闕保德七元日上上登玉宵下下合帝一畢乃口微祝曰天上內音掌堂逮元眇靈地上外音大劫回末始交大洞黃素中元君消魔玉符訣曰當朱書青繒佩之存呼中元君內諱名字鎮我胸腹之境使死氣絶滅五內生真七祖騰飛更受胎仙神安氣朗超登帝晨乃叩齒三通咽液三過太皇上真玉華三元君道經第二十四白素右元君章謹請白素右元君啓明蕭創字金門上常守兆下關之境從小腹至腳底使三積之宿穢無滯地戶之土鬼沉滅明玉之液上淘於極隂之宫素金之氣逆衝於兩腕之內髀受九靈之潤腳生重玄之雲纍祖解於冥罪七世散於禍根更生南宫上宴帝軒真思白素右元君啓明蕭創真氣月光玄雲之色𦋇於頂上乃默呪曰白素啓明九天同生髙虛素轡浮景玉清回真曲仙流灑八溟通幽逹微朗耀華精使我內徹五孔開明神公來遊我道克成次思月華之氣從兆泥丸中入兆乃口吸神雲咽津六過結作六神狀如力士下入絳宫穿小腹二欲孔兩膀胱下布下關之境至兩腳心出去身五丈乘玄雲順時吐息誦玉經大洞玉經曰天皇上真氣三元乘神回法坦興朱霄帝昌泥丸神名啓玉扉拔尸命門內解結桃康階斂神保五籍越轉入太微三五混一六液精合平公子無英奉符司心神命保生紫房洞耀泥丸安寧百關備仙五華飛冥雲飈流逸八景浮清併羽大帝擕帶寒庭月中沉殃天津絶滅胞莖七世纍玄解結南庭朱陵太微玉清帝君祝曰魂生九氣氣變成神五老纏㑹太一化仙二十四真徊形帝先九曲下戶鎮生白雲黃庭六府含養命根胎結胞樹種栽死山一得拘制受斷滅源符籍清明金映玉軒長為德伯世得道恩升登日月遂友帝先畢乃口微祝曰天上內音保解乘結六庭地上外音生雙門入仙胎大洞白素右元君消魔玉符訣曰當青書黃繒佩之存呼右元君內諱名字鎮我下關之境使三真固魂九靈制魄萬神總歸安鎮室宅七祖解散名言仙籍乃叩齒三通咽液三過上清大洞真經卷之四
