front:
  text: 上清大洞真經卷之五荒九
  hash: sha256:c4b40b0c0473e98b855fe72e205b2ed6055c9c680b29cc7c0e694f72c182ad6f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0006_HFL_005-001a, image: hfl/0017/0017-088.png}
body:
  text: 茅山上清三十八代宗師蔣宗瑛校勘太一上元禁君道經第二十五日中司命章謹請日中司命接生君字道靈常守兆左手通真之戶死氣之門使四大正明玉華保真魔氣滅絶生神固靈七祖解脫魂魄更生真思日中司命接生君真氣三華之色罩於頂上乃默呪曰四大乘天天元來歸三華吐曜司命景飛為我招仙七祖散間上登太虛日月同暉次思三華之氣從兆泥丸中入兆乃口吸神雲咽津三過結作一神狀如太陽星手執太陽下入絳宫入左膀胱入玉莖中入尾閭穴上入第一椎穿泥丸左目頰腮內入肩入臂髓內過入左手通真之戶順時吐息誦玉經大洞玉經曰太一上元五神安城七轉洞經三徊真符攝鬼命靈五嶽真人奉符執經除落死藉刻金金閣書生大帝有教營衛紫房九真備守五老保關三官司命促對帝言七世絶災玄葉無𠎝種福空同散結禍根髙上消魔玉清王祝曰太一務猷傳召北司玄一老子握節往來元素無英把符白元洞陽守雌煥然晨光明披霞升帝墉列坐震靈席混合五日房白氣胞神育上生青君胎神案延昌左擕精上門結神右抱合和嬰節神我生日月華友賔赤氣王日神八景照泥丸朗然洞房眉洞入三寸中嬰兒為赤子土一赤子混離血神生玉容五道秀金華位為上清公仙位七祖斷玄滯身得乘神風徘徊三清上和樂反嬰童畢乃口微祝曰天上內音丹明昌左帝根地上外音無常子得大明將車梁大洞日中司命接生君消魔玉符訣曰當朱書青繒佩之存呼司命內諱名字鎮我左手之戶乃叩齒三通咽液三過元靈黃房真晨君道經第二十六月中挑君章謹請月中桃君名方盈字運梁常守兆右手通真之戶死氣之門使兆四運通明三神固精保鎮萬氣與神長寧真思月中桃君方盈真氣月暉之色罩於頂上乃默呪曰元靈黃房內月君號方盈左宴朱嶺臺右擕仙皇庭寢景三秀房結我始生神同飛入玄玄七祖反華嬰次思月暉之氣從兆泥丸中入兆乃口吸神雲咽津三過結作一神狀如太隂星手執太隂下布絳宫入右膀胱入玉莖中入尾閭穴上入第一椎穿泥丸入右目頰腮內入肩入臂髓內過入右手通真之戶順時吐息誦玉經大洞玉經曰元靈黃房乳中內中有黃寧童命門神左有堅玉君骨神右有帝昌皇腦骨神浮清翳晨氣蔚蔚虛靈容青肝明輪子肝神開朗徹八窗太一疇丘蘭斗中文女奉符入玉宫拔我七世罪回元期五通混合帝一室五老變孩蒙太上晨景玉清王祝曰九元鎮真五老纒綿日月中王與兆為親太混三五離落魄魂百節金映玉液回神五府生華白氣運煙充溢三清紫房寶津上開仙戶下塞死門令我羽籍玉帝之前七祖父母反生南軒虎服攝魔龍旌命神太一錦旄招束三官除滅死籍刋名玉真天帝號保生太上日月同年畢乃口微祝曰天上內音變世氣三道遷地上外音理命非幸連劫太洞月中桃君方盈消魔玉符訣曰當朱書青繒佩之存呼桃君內諱名字鎮我右手通真之戶乃叩齒三通咽液三過太極主四真人元君道經第二十七左目童子章謹請左目童子名飛靈字陽光常守兆左目死氣之門使兆陽生於內清潔於外二氣交通四朗八會徹見無方萬神自泰真思左目童子飛靈真氣日華之色罩於頂上乃默呪曰四極太靈元君精瑛日華充溢童明流光二景相照通我明梁三丹啓真我道開張翠羽羅裙飛上玉京次思日之華光從兆泥丸中入兆乃口吸神雲咽津三過結作一神狀如太陽星手執日光下布絳宫穿玉莖中入尾閭穴入脊髓上入第一椎穿泥丸入左瞳人內搖睛七過不得動右睛順時吐息誦玉經大洞玉經曰太極主四真凌羽逸上清七轉召司命太一揚威明司録促詣位三舉登震靈方丈符魔王來受事仙官束鬼精日中青帝毋號曰芬艷嬰太張黃素上五符安來紫素上玉名混化六合內洞房列火兵去兆死籍名遷玉門東華帝一保身五老衛神上登太明天國金輪霄玄太上髙晨玉清王祝曰我乘混合氣纏固九真丘養光脾神太昌子駢羅凝羽珠九尊衆帝生九帝子洞景徊須臾七祖結解散穢積忽巳除世世生福昌玄玄獲仙書身升太霞宫控龍宴玉虛上朝上清皇寢興幸正扶斗中內妃畢乃口微祝曰天上內音登來張乘法謨地上外音靈壽臺宜生人大洞左目童子飛靈消魔玉符訣曰當朱書黃繒佩之存呼童子內諱名字鎮我左目之瞳乃叩齒七通咽液七過四斗中真七晨散華君道經第二十八右目童子章謹請右目童子名晨嬰字隂精常守兆右目死氣之門使隂映內朗陽觀外明三晨同煥徹見玉清真思右目童子晨嬰真氣月華之色罩於頂上乃默呪曰七晨飛華華散三光混合成真上招月魂為我降靈啓我仙門七祖同飛上朝帝君次思月之華光從兆泥丸中入兆乃口吸神雲咽津三過結作一神狀如太隂星手執月光下布絳宫穿玉莖中入尾閭穴入脊髓上入第一椎穿泥丸過入右瞳人內搖睛七過不得動左睛順時吐息誦玉經大洞玉經曰斗中四真四斗人散華玉清臺帝卿仲玄生天帝之佐一徊衆真來香風扇三寶五藏映青夷宫名天帝奏仙拔擢七玄種死成樹沉絶胞根太一揮風號曰寄頻太一字斷絶血穢斬伐注煙白帝西華白帝字為我北神髙上神霄玉清王祝曰三素牢張上老君神生道三素字固我魄逸遊保兆六合腦憂苦沒曲門死氣閉地下身與帝一君併襟樂六府鑑心丹玄房熙氣泥丸野體耀金暉羽籙召真白氣重鬱百神光鮮長與日月符籍纏綿世保道德永為天仙寂寂內注遂升帝晨畢乃口微祝曰天上內音鮮曲玄鏡重車地上外音長濟樂脫憂苦大洞右目童子晨嬰消魔玉符訣曰當青書黃繒佩之存呼童子內諱名字鎮我右目之瞳乃叩齒三通次咽液三過晨中皇景元君道經第二十九肺部童子章謹請肺部童子名素明字無映常守兆肺部之下五關死氣之門使玄暉充徹華蓋上精神室有光五關太明萬魔不入百神受靈真思肺部童子素明真氣五關輝光罩於頂上乃默呪曰童子素明黃雲九纏滄臺飛輪三神協真號曰玄上景列位髙王賔總攝命百神擕我入紫煙次思暉光從兆泥丸中入兆乃口吸神雲咽津五過結作五神狀如孩童下布五藏上充華蓋入鼻凹五色神雲分入兩目左三右二搖睛九過順時吐息誦玉經大洞玉經曰晨中黃景氣三秀山名登霄庭滄臺飛羽輪迎延符名道巳成司命奉帝書號為玄度卿司命字保生太霞宫列賔館上清命門合精延守我身黃寧左擕元素君右攝朱鬱靈髙上消魔玉清王祝曰二老在左右方帝魂不可不分三九變其上下太一立其中根五神奉我生籍司命塞我死門九宫合而為一六合總而內真世獲仙書福慶纏綿五老對席日月為親太一來迎上升帝晨七祖滯血皆為拔根反胎南宫受生帝軒兆宴玉堂同襟帝輪世世列圖羽服揚旙子子保昌慶及後玄長為仙伯役使萬神畢乃口微祝曰天上內音總命本登龍津地上外音玄劫會萬履阿大洞肺中童子素明消魔玉符訣曰當朱書黃繒佩之存呼童子內諱名字鎮我肺部之户神安室府魔氣滅喪乃叩齒三通次咽液三過金闕後聖太平李真天帝上景君道經第三十胎中白氣君章謹請胎中一元白氣君務玄子字育上生太一精魂玄歸子字盛昌共守兆五藏之上結喉本戶死氣之門使三華之氣入帝一之府九明之津生六胎之下九玄散禍七祖解結身登玉堂位列太一真思胎中一元白氣君務玄子太一精魂玄歸子真氣三華之色罩於頂上乃默呪曰金闕煥玉清白氣映丹霞明光鬱金靈五色吐三華流津宴寢堂結我始生芽五符召百神威章徴萬魔保此億劫仙道明無凶邪次思三華之氣從兆泥丸中入兆乃口吸神雲咽津三過結作三神白氣君白衮冕二神侍立下布結喉之本戶順時吐息誦玉經大洞玉經曰金闕上景氣十方輝紫煙三命太一帝五召太平神外神七轉招嶽真玉符告三官拔籍三靈下三官府受生髙上晨太帝八靈王陽堂玉字一化回慶玄桃君守六合勒精帝卿字衛泥丸震靈符名攝魔三舉符名登壇所召促到混離對陳無令上帝告察凶姦太上消魔玉清王祝曰天生八氣回合帝鄉五神奉符司命扶將拔斷死籍蕩穢幽冥七世解結延福玉庭血積沉沒三素黃紫白煥清兆升天堂與帝合靈世得仙契所感必成種年日中植命月庭反胎童蒙目為孩嬰生與天同夀與日并畢乃口微祝曰天上內音暉延勒得日賢地上外音籍會元帝符子大洞胎中一元白氣君消魔玉符訣曰當朱書黃繒佩之存呼白氣君內諱名字鎮我五藏之上七祖解釋消結滅罪乃叩齒二通次咽液二過太虛後聖元景彭室真君道經第三十一結中青氣君章謹請結中青氣君案延昌字合和嬰元君精魂保谷童字明夫共守兆五藏之下大胃上口死氣之門使金液流布玉華映魂神飴溢於窮腸帝氣充於九關釋七祖於玄幽更受胎於南仙上葉解結下胞脫根真思結中青氣君案延昌元君精魂保谷童真氣玉華之色罩於頂上乃默呪曰離合九靈二真幽密太虛重天上擕太一雌雄混合同仙妙室上變九仙下解胞結七祖慶欣五苦解脫使我飛騰靈化本質次思玉華從兆泥丸中入兆乃口吸神雲咽津三過結作三神一神青衣二神侍立下布五藏之下大胃上口順時吐息誦玉經太洞玉經曰太虛空無景山名霞中有彭室帝君室九雲合重扉帝君靜幽密八真下關神合景君上擕女斗中妃太乙雌雄混玉房九變還得七分形散六合泥丸易分别脾神養光肺神梁南書我五符刋玉刻金生華日茂死氣月沉拔尸於胃受真於心禍害冥散七祖樂欽髙上神霄玉清王祝曰種福九天外拔尸地門下七玄解滯積斷樹除憂苦反胎朱火宫更生九玄戶真氣日日臻禍害日日除兆升三清堂乘飈上景庭命與月毋俱年隨日帝生纍世保仙籍回老更童嬰福升六合內受圗永長生畢乃口微祝曰天上內音乘元輪入幽宗地上外音禍車滅養無景大洞結中青氣君消魔玉符訣曰當朱書赤繒佩之存呼青氣君內諱名字鎮我五藏之下使玉華映魂七祖受生南仙乃叩齒三通次咽液二過太玄都九氣丈人主仙君道經第三十二節中黑氣君章謹請節中黑氣君斌來生字精上門帝真精魂幽臺生字觀上生共守兆九腸之口伏梁之下戶死氣之門使太玄之氣布散腸內太一之神徊行百節令兆體有金光面有玉澤七祖父母得解冥罪纍葉之先世世解結上生帝房入保飈室真思節中黑氣君斌來生帝真精魂幽臺生真氣玉光之色罩於頂上乃默呪曰太玄何寥寥黑氣生上靈帝真洞明景九氣合神廬變化咄嗟頃倐忽肇明初萬真鍊我仙百關自靖居七玄斷胞樹九曽登福墟上招景中子與我登雲輿次思玉光從兆泥丸中入兆乃口吸神雲咽津二過結作二神黑衮冕下布九腸之口伏梁之下戶順時吐息誦玉經大洞玉經曰太玄九氣上煙回太暉間神光秀空峯山峯五道煥三天駕景登絶霄乘風蕩滯神中一曰運珠心神理心入清間混合三五宫纍變億萬千伐絶胞樹生四斷血尸根七祖散積結反華黑幽玄髙上神霄玉清王祝曰帝魂照無阿帝魂名常鎮兆生門伏尸滅落保魄寧魂玄毋回光隂神奉帝玉仙右命太一乃及兆身北宴上清列為玉賔命生日華年合月煙長躋金房晨景為鄰除憂伏胃門拔苦三途中福積丹玄內玉女赤子慶充泥丸房百神混帝一大慶流回風反兆朽艾形攺貌為嬰童世世入仙臺玄玄登羽宫大劫雖屢傾與日方增崇畢乃口微祝曰天上內音無阿纍奉神沖地上外音見玉賔拔戀塗大洞節中黑氣君消魔玉符訣曰當黑書青繒佩之存呼黑氣君內諱名字鎮我九腸之口使太上之氣充散九府太一真神回行關戶玉光生體保生玄母七玄受慶反形幽腐乃叩齒五通次咽液五過洞清八景九玄老君道經第三十三胞中黃氣君章謹請胞中黃氣君祖明車字神無極天帝精魂理維藏字法運珠共守兆小腹之內二孔之本戶死氣之門使日月之根生於二戶之下五帝之氣充於極隂之宫精華盈滿玉液填溢七世之父母反胎宿對之殃魂解結上生南宫神仙受氣真思胎中黃氣君祖明車天帝精魂理維藏真氣黃雲之色罩於頂上乃默呪曰上清曜玄臺八景乘天紀黃氣協神真精魂對帝子太一度命籍五符固不死擕仙帶晨暉徊風反形始拔苦出七祖同歡九玄裏次思黃雲從兆泥丸中入兆乃口吸神雲咽津二過結作二神黃衮冕下布小腹之內二孔之本順時吐息誦玉經大洞玉經曰上清絶霞外八皇運八老君九天九宫幽寥重冥空字生帝子上歸字擕此景中人向制晨登大老寢大老寢室夕宴金華山名便羽節命太一錦旗招萬神堅我六府胎伐滅胞樹根解結生七祖散禍寧九玄赤帝丹靈曰帝峙扶兆入玉門月母靈素蘭守閉死氣門太上消魔玉清王祝曰白雲合神景乘素會太微上朝帝一室解帶皇一階太一之上啓明四素君金門臍中三陽真四召上歸魂女升我身內神覆蓋太明威太寶九華光映兆形招雲混真散香要靈月中反胎日中受生年停曜景命遂無傾身為仙王保此玉清世受真書玄華玉庭畢乃口微祝曰天上內音映遂劫度連絶地上外音濟寒熱得全氣大洞胞中黃氣君消魔玉符訣曰當黃書白繒佩之存呼黃氣君內諱名字鎮我小腹之內二孔之本七玄之祖上升帝室乃叩齒三通咽液三過東華方諸宫髙晨師玉保王青童君道經第三十四血中赤氣君章謹請血中赤氣君混離子字叔寶堅司命精魂發紐子字慶玄共守兆百關之穴絶節之下死氣之門使五帝之液盈於六府九靈之潤充於血肉絶節不空地門填塞七祖結散更生南極兆得玉仙合道保德真思血中赤氣君混離子司命精魂發紐子真氣赤雲之色罩於頂上乃默呪曰晨景煥東霞丹景映髙清二真協神宗落落七華生五老飛帝席太一保童嬰錦雲曜幽夜朗朗開重冥七祖勒符籍南極受胎靈髙晨盻雲輿運我升飛軿拔解億世基同歡萬劫程次思赤雲從兆泥丸中入兆乃口吸神雲咽津七過結作七神下入絳宫六神狀如力士分左右各三下布兩腳絶骨之戶一神狀如赤帝下入尾閭穴上穿泥丸充入髮際之戶順時吐息誦玉經大洞玉經曰東華青宫發始暉髙晨青童君映上清煥洞圎珠蔚曰名朗朗紫曜明七神回帝席五老飛玉軿太一景中立司命攝萬精泛然雲波間寂盻泥丸城七轉召三官北君冥官啓首靈五嶽應氣到拔死書長生三舉震丈符玄解大魔精七祖散血結玄華保黃寧髙上消魔玉清王祝曰五道混回七門白帝門始分南和赤帝建節白帝彰安靈標肺神理魄會昌護神奉符登霄寢息玉軒定録瓊禮世為天仙三塗塞絶除伐胞根死氣沉零禍輪無連福臻重枝慶會華玄名書玉堂內世為道德門畢乃口微祝曰天上內音觀軒寢明賔鬱地上外音三生連虛無中大洞血中赤氣君消魔玉符訣曰當朱書黃繒佩之存呼赤氣君內諱名字鎮我百關之穴使靈液盈充玉澤流溢死氣斷絶神固孔節七祖各散宿根咸滅乃叩齒三通次咽液三過上清大洞真經卷之五
