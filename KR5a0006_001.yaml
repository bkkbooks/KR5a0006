front:
  text: 上清大洞眞經卷之一
  hash: sha256:1b3805a99771a8753910e31b394e5ecb9775c4948fd8e2f29d9985a7eeb5bef2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0006_HFL_001-001a, image: hfl/0016/0016-108.png}
body:
  text: 茅山上清三十八代宗師蔣宗瑛校勘誦經玉訣訣曰先於室外秉簡當心臨目扣齒三通存室内有紫雲之炁遍滿又鬱鬱來冠兆身存玉童玉女侍經左右三光寳芝洞煥室内存思畢扣齒三通念入戸呪曰天朗炁清三光洞明金房玉室五芝寳生玄雲紫蓋來映我身仙童玉女爲我致靈九炁齊景三光同軿上乗紫蓋升入帝庭畢先進右足入户三捻香扣齒三通祝曰玉華散景九炁含烟香雲密羅徑衝九天侍香金童傳言玉女上聞帝前令臣長生世爲仙眞隨心所願莫不如言誦經入室存思之圖存思畢次念開經玄藴呪曰微微玄宗門煥朗徹空同至道由靜黙當見三素宫大道於此成驂景䇿雲龍左右侍經眞玉女及玉童身濟不死津解羅順靈風七祖返胎生世爲神仙宗畢北向叩齒三十六通冥目内視俯心祝曰糞土小兆男生臣某今有微言上啓玉清瓊元君臣今登齋入室誦詠上清大洞眞經三十九章伏願驅除魔試辟却鬼病臣及七祖罪解福生次祝曰六天大魔王受制幽寥無白距玃獸赤甲毒龍鎭守四維備衞九重白鷹仰鳴奮爪振豪萬精幽匿滅邪破妖天丁一怒五嶽振摇風火征伐九天啓朝畢北向四拜三叩齒長跪臨目叩齒二十四通啓曰糞土小兆男生臣某至心上啓髙聖萬眞太上大道君臣今入靖焚香誦詠上清大洞眞經三十九章鍊神保藏乞胃管華榮聳身乗虚上拜帝庭臣七祖罪釋上生福堂畢又四拜長跪啓曰臣某至心上啓中央黄老元素道君臣今入室焚香披詠上清大洞眞經三十九章願臣靖室之内芝英自生玉華寳曜三光洞明臣昇上清合同帝靈使七祖罪解克獲長生畢又四拜三叩齒長跪啓曰臣某至心上啓上清緫仙大司馬長生法師王三天君栢成上眞畢又四拜三叩齒長跪啓曰臣某至心上啓降授大洞眞經祖師上眞聖母紫微元君王夫人畢又四拜三叩齒長跪啓曰臣某至心上啓降授徊風大混合師上眞聖母中候元君王夫人臣今入室焚香諷讀上清大洞眞經三十九章伏願調和三䰟制鍊七魄尸蟲沉落腑藏光華百病不生災害消滅色返嬰孩白日騰翥願七祖罪解上生福堂畢東向四拜燒香叩齒三十六通存東華六門治東壟山周回三千里門内有三宫羅列分明第一宫方諸青宫上相青童君所治第二宫玉保青宫玉保王上相大司馬髙晨師所治第三宫玉華青宫東海青華小童所治次存念六門名及門郎姓字東青華門門郎丘伯淵南神華玉門門郎王祖思西玉洞門門郎𢈔尚節北玉隂門門郎史少華東南天關門門郎文五車東北寒水門門郎童林都次叩齒三通仰祝上清玄晨三宫六門典我玉名降我神眞龍裙羽章以給我身誦詠洞章朗徹九天上升玉清東華投篇名刻金格長爲帝賔畢咽炁九過東向燒香四拜三叩齒長跪啓曰臣某至心上啓上清九微太眞玉保王金闕上相大司命髙晨師東海玉明青華小童大君畢又燒香四拜三叩齒長跪啓曰臣某至心上啓上清太無東震扶桑丹林大帝上道君畢又燒香四拜三叩齒長跪啓曰臣某至心上啓祖師南極紫眞上清道主太微玉晨聖后金闕上保東華道君金闕大夫上清仙侯臣今入室誦詠上清大洞眞經三十九章願晨暉煥發映照臣身腑藏榮華災禍消散七祖返胎同駕雲輿畢又燒香心拜經前微叩齒二七通祝曰太一帝尊帝一玄經五靈散景鬱徹三清玉童玉女燒香侍靈上願開陳與我合形使我神仙長享利貞畢又叩齒二七通微誦發篋呪玉帝上法上聞三清吉日齋戒敢開神經萬試隱伏所向皆成玉童侍衞玉女散馨聲聞五億響徹萬靈上告三元與我長生畢又叩齒二十通心再拜次三捻上香登座平坐正視北向叩齒三十二通咽液三十二過閉目存帝一尊君次思兆頭正青如碧玉兩手如丹兩脚如雪身着九色羽衣披龍文之帔頭建玉晨之冠手執九色之節青龍侍左白虎衞右頭䕃華蓋下坐獅子仙童侍香玉女散花紫雲蓊鬱滿於室中五色玄黄羅列前後内外分明皆使映朗畢叩齒三十六通微誦三天滅魔呪北帝大魔王受事帝君前泉曲之鬼四明酆山千妖混形九首同身神虎放毒馘滅雷震神功吐呪所戮無親太微有命攝録山川鳴鈴交擲流煥九天風火征伐神鋒十陳兇試伏滅萬精梟殘妖毒敢起受閉三關請依洞法莫不如言畢又叩齒三十六通次誦大洞滅魔神慧玉清隱書玄景散天湄清漢薄雲回妙炁煥三晨丹霞耀紫微諸天舒靈彩流霄何霏霏神燈朗長庚離羅吐明輝回嶺帶髙雲懸精䕃八垂三素啓髙虚蘭闕披重扉金墉映玉清靈秀表天畿風生八㑹宫猛獸騁雲馳紛紛三洞府眞人互參差上有干景精㝠德髙巍魏太一務猷收執命握神麾正一履昌靈攝召萬神歸公子翼寂轅洞陽衞玄機明初合道康龍輿正徘徊七景恊神王飈輪萬杪階體矯玄津上飛歩絶嶺梯披錦入神丘璨璨振羽衣㝠攄交雲㑹飛景承神通清峯無毫薈綺合生絶空金華帶靈軒翼翼髙仙翁萬轡乗虚散蓊藹玄上牎中生合景君九帝昌上皇明輪映黄寧羽珠曜玄陽天精元素炁中五號養光結朗始生神九眞合成𩀱妙景啓㝠數順感標神蹤泥丸洞元光運珠正絳宫元陽部命門三神擕紫童拘制召上歸夾闕侍明牎翳鬱對啓明圎華煥三冲方盈引接生反老回嬰蒙飈粲麗九天緑轅繞丹房蕭蕭纒靄表曲降寢華堂遊宴盻萬劫歸㑹神霄王仙道樂子生鬼道樂子凶但聞貴生道不聞鬼道隆謡歌參天炁賈生元正章神慧命朱兵五帝符寒郷仗旛攝萬魔瓊文檢北酆體解自然道妖滅非爾功汎景鼔長扇合虚慶霄峯俯盻四謝飛天劫永難終妙中生眞景回輦苦遲遲意合在㝠感提携髙上埼翔翅期妙㑹洞觀情轉悲嘯咤咄嗟頃倐忽歷九圍攝炁反交初併景幽玄棲於是七星停曜重關洞開百陽激電五星奔移握節命靈是炁悉追鐡羆羅遮猛虎變威六師斬妖銅頭捕非玃天啖毒晶消摧萬精滅種六天崩頺三道正行何炁不回山河爲之傾倒日月爲之揜暉靈獸爲之墮嶺金翅爲之落飛五帝束帶於神宇萬靈受封於太微髙上汎蓋於丹崖八景䇿駕於霄扉洞觀源之妙化欣我道以坦懷畢又閉目黙念次心拜四方眞思兆身坐五色雲中雲氣覆蓋頭上想定次就座右顧東向㝠心叩齒九通隂誦太帝君素語内呪蒼元浩靈少陽先生九炁還肝使我䰟寧幽府結華藏内鮮明鍊容固髓返白爲青神化内發景登紫庭敢有犯試摧以流鈴上帝玉籙名上太清畢口引東方青陽之精青炁用鼻先取以口咽喉吸之餘四方並同因閉炁九息咽炁九過使布滿肝腑之中結作九神青衣冠狀如木星下布肝内神靣相向坐順時吐息次就座仰首南向㝠目叩齒三通隂誦天帝君素語内呪赤庭絳宫上有髙眞三氣歸心是我母心騰我淨躬逕奏以聞心固神靜九靈閉關金眞内映紫烟結雲太微緑字書名神仙飛行上清朝謁帝尊畢口吸南方丹靈之精赤炁因閉炁三息咽津三過使充布心腑之中結作八神赤衣冠狀如火星下布心内神面相向坐順時吐息次就座左顧西向㝠目叩齒七通隂誦南極上元君素語内呪素元洞虚天眞神廬七炁守肺與神同居保鍊五藏含華内敷澄誠明石㳺御玄虚玉字金簡九帝眞書使我飛仙死名巳除遊洞三清適意所如畢口吸西方金䰟之精白炁因閉炁七息咽津七過使充布肺腑之中結作七神素衣冠狀如金星下布肺内神面相向坐順時吐息次就座正視北向㝠目叩齒五通隂誦後聖帝君素語内呪玄元北極太上之機五氣衞腎龜玉參差寳華結絡胃管朗開著名玉札年同二儀上皇太帝峙然不迷役使六甲以致八威驂龍駕浮超然昇飛吐納神芝歷劫不衰畢口引北方玄曜之精黒炁因閉炁五息咽津五過使充布腎腑之中結作五神黒衣冠狀如水星上入絳宫左三右二分入兩膀胱穿尾閭穴上充布兩腎間神面相向坐順時吐息荒五十五次就座正向本命上㝠目叩齒十二通隂誦太微天帝君素語内呪黄元中帝本命之神一氣侍脾使我得眞寳藏生華結絡紫晨變景錬容保命長延後物而傾千神來臣老君玄籙書名神仙長生久視與天長存畢口引中央髙皇之精黄炁因閉炁一息咽津十二過使充布脾腑之中結作十二神黄衮冕狀如土星下布脾内神面相向坐順時吐息存五方炁都畢又微呪曰五炁混生玄上之精充布五腑六宫鮮明内灌外溢表裏俱清滅穢招眞我飛太靈常對髙晨誦詠洞經次想左目出日右目出月並徑九寸在兩耳之上名曰六合髙牎想定微呪曰太上玄一九皇吐精三五七變洞觀幽㝠日月垂光下徹神庭俠照六合太一黄寧帝君命簡金書不傾五老奉符天地同成使我不死以致眞靈却遏萬邪禍害滅平上朝天皇還老返嬰太帝有制百神咸聽畢口吸日月一息炁分三九咽結作二十七帝君並紫衣冠内九帝下入絳宫穿尾閭穴上入泥丸又九帝亦下穿絳宫入下關之境又九帝入中關之境令日光使照一身内徹泥丸下照五藏腸胃之中皆覺洞照於内外令一身與日月之光共合良久叩齒用嘻字吐息次心存二十四星大一寸此法毎日行住坐卧皆可修之如連結之狀又存毎星中各有一人合二十四星皆如嬰兒之狀並裸體無衣纓於是二十四星從虚空中降回繞一身之外三帀畢祝曰二十四眞回入黄庭口吐黄炁二十四星灌我命門百神受靈體充骨彊䰟魄安寧五藏受符天地無傾畢口吸二十四星一息炁咽津二十四過時覺吞一星從口中徑至臍中又覺星光映照於一腹之内洞徹五藏又存星光化爲二十四眞人並口吐黄炁如烟以布臍中鬱鬱然洞徹内外良久用呼字吐息心拜三十九過次思兆身三十九戸逐一分明各有神眞嚴固守之存三十九君各降眞炁來灌兆身三十九戸咽津三十九過次振左手三過法振流金火鈴次振右手三過法擲豁落七元次仰頭摇頸九過法承天次鼓脚一過法履地次摇身二七過以歡萬神次拭目三過以明三光次捻鼻七過以通明梁次按眉後兩穴三過以塞邪源次輪耳三周以開天牎次咽液九過以味玉律以用前修導一身都畢萬神皆歡乃微呪曰承天履地出入洞門左振流鈴右擲七元帶金佩玉仙衣紛紛八景羅列䇿輿乗雲萬遍朗逹飛入帝晨畢平坐誦經存帝一尊君對兆面前空玄中坐尊君之口正對兆口聽兆所讀眞經上清大洞眞經卷之一
