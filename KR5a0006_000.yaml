front:
  text: 上清大洞真經序荒五
  hash: sha256:6a3303763be61525fb8ce7bdd90a6cc312624b1fd43d54ddd2faf3d51449367c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0006_HFL_000-001a, image: hfl/0016/0016-102.png}
body:
  text: 茅山上清二十三代宗師觀妙先生朱自英述夫道生於無潛衆靈而莫測神凝於虛妙萬變而無方杳冥有精而泰定發光太玄無際而致虛守靜是之謂大洞者歟及其斂精聚神御祖氣以徊旋錬神會道運祥風而鼓舞無中歘有呼吸散萬神之形動極復靜恍惚圍帝一之妙是之謂徊風混合者歟為天地普植之本帝聖造化之原人之生也稟氣於太極而動靜法乎天地肇靈於一元而闔闢體乎隂陽故上清三十九帝皇回真下映入兆身中三十九戶於是各由其所貫之戶著經一章其辭幽奧以用領括百神超真辟非所謂慶雲開生門祥煙塞死戶者此歟故中央黃老元素道君總彼列聖之奧旨集成大洞之真經故曰三十九章經也又有徊風帝一髙元雄一五老雌一是三經者所以輔乎三十九章之尊經耳夫道有三竒第一之竒大洞真經三十九章第二之竒五老雌一寶經第三之竒素靈大有妙經故三十九章者乃九天之竒訣上元太素君金書之首經也一名三天龍書一名九天太真道經此經之作乃自玄微十方元始天王所運氣撰集也西王母從元始天王受道乃共刻北元天中録那邪國靈鏡人鳥之山闍萊之岫乃於虛室之中聚九玄正一之氣結而成書字徑一丈于今存焉元始天王又以傳上清八真中央黃老君使教授下方當為真人上升三辰者焉中央黃老君隱禁此經世無知者故人間地上五嶽天中永無此經上清天真尤所寶祕唯太玄有金閣玉名瓊札紫簡三元有併晨祕籙丹臺有黃文之字當必為真人者乃得受之爾是經也上皇之道標紫晨之妙篇制命九天之階徴召五帝之靈逸徊風之混合凝九轉於玄精交會雌雄混合萬神森羅幽鬱瓊響太真運辟非於明梁通易有於玄門洞德創以造妙濯耀羅而映雲太漠為靈關之氣無創為浩劫之年巍巍神館萬真之淵金房煥赫鬱乎上清其旨幽微難可究詳兆能長齋絶志人間誦玉篇於曲室叩瓊音以震靈則真人定籙於東華七玄更潤於紫房制魔王以威神攝五帝以衛身萬遍周而肉身飛七轉召而司命至此大洞之竒章總億道而反生自無竒毛異質金骨玉名皆不得有妄披於靈文其禁悉依九真明科兆當苦齋三年乃得讀之誦詠此章萬遍既畢中央黃老道君上奏太上命丹飈緑蓋之車九靈使者太乙司命來迎於子於是五老翼軒八風扇羽神雷前驅玉華扶轂乘雲駕龍即日升天詣太素三元君宫中受書是謂上登上清受書太極拜為髙仙左卿者也兆若但有此經不得讀之者太微天帝君拔出死簡於授經之始刋定真籙於造齋之初度籍太極刻名東華關奏太上録封龜臺萬神千靈自稱兆為九玄大夫位凖太清仙伯也受經之格一依九真明科兆冝遵焉
