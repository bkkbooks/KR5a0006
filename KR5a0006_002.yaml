front:
  text: 上清大洞真經卷之二荒六
  hash: sha256:1697f71721fadfa27e3f968c72c232b02cb68c67240f971e80ba9967c3b5fd94
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0006_HFL_002-001a, image: hfl/0016/0016-148.png}
body:
  text: 茅山上清三十八代宗師蔣宗瑛校勘髙上虛皇君道經第一太微小童章謹請太微小童干景精字㑹元子常守兆舌本之下死氣之門口吐赤雲繞兆一身化生血液上凝泥丸泥丸堅明百神方位真思太微小童干景精真氣赤雲之色𦋇於頂上默呪曰真氣下流充幽關鎮神固精塞死源玉經慧朗通萬神為我致真命長存拔度七祖反胎仙制鍊百神一氣全次思赤氣從兆泥丸中入兆乃口吸神雲咽津三過結作三神一神狀如天蓬大將二神侍立下布兆肝內遊遍却入心內絳宫上充舌本之下血液之府順時吐息誦玉經先以左手按捻鼻間人中次誦經大洞玉經曰髙上洞元兀生九天氣祖太無衆風亂玄玄曽絶散四清撫間帝大洞尊君號一上景連衆攝烟長契一運七世投間託靈屬命反華自然泯邈流虛六曜沉遷陵梵玉帝君名銜暉西華白帝字名彰安併編帝簡盡得解源胎符田田𨗉密處路世發玉蘭靈光八暉混生萬神玉清消魔王柷曰天有大隱心生之寶稱曰明心梁之上辟非烟氣守我絶塞之下腎戶更受生牢門命門之外乃又召益元鼻神之羽童列於緑人中室之軒使解七祖百結隨風離根配天遷基達變入玄元素髙上神霄玉清王祝曰元氣本非生五塗承五行虛出雌雄寄隂陽神化森羅𨗉幽鬱玉音響太和萬唱無中發仙庭回九變百混同得一易有西北天門名合虛中俱入帝堂㑹畢乃口微柷曰天上內音三藍羅波逮臺地上外音天命長人恆寧大洞太微小童消魔玉符訣曰當青書黃繒佩之存呼小童內諱名字鎮我舌本之下固液凝神斷塞死源乃叩齒九通次再咽液三過上皇玉虛君道經第二太一尊神章謹請太一尊神務猷收字歸㑹昌常守兆玉枕之下泥丸後戶死氣之門使生真氣入于泥丸七祖父母受玄更生上籍玉皇重華萬寧真思太一尊神務猷收真氣紫雲之色𦋇於頂上默呪曰太一保命固神定生為我上招帝真之氣下布紫戶之庭玉經仰徹九玄朗明七祖同歡俱升上清次思紫氣從兆泥丸中入兆乃口吸神雲咽津三過結作三神狀如木星紫衣冠下入絳宫穿尾閭穴上衝泥丸後戶玉枕之下三神並立神目內觀紫戶順時吐息誦玉經大洞玉經曰玉虛太空順玄太一精魂歸天晨雌一金霄雄一遊朗朗生帝雄一神名景欻巳宴玉雌一神洲左攝太微小童始童神右命起恆帝卿名扶明真曰名煥九霄三日三天之日映玄北極敷干景太微小童併生襟內有幽寥太一字無令我得長年千劫始一周黃録保德創披錦入神神室丘太一神名務命根公子無英召合符玉清元始王祝曰兆身常死關結胎害百神百神解胎結披散胞內根七祖入帝帝一室室一體合神仙神仙㑹玉胸中堂七祖生南宫併帶理明心神初同帝孩道始生之室康萬真守身形是曰藏初明帝一回雌雄休鎮百神門閉塞萬邪戶受事九宫腦中聞典禁召司陽神命三日朝泥丸畢乃口微祝曰天上內音離堂合推運入地上外音延天骨辟毒龍大洞太一尊神消魔玉符訣曰當朱書青繒佩之存呼太一內諱名字鎮我泥丸後戶之外閉塞死氣之路通理幽關之際解七祖於五難度更生於交帶乃叩齒九通次咽液九過皇上玉帝君道經第三玉帝君章謹請帝君絳凌梵字履昌靈常守兆兩眉中間紫戶外宫死氣之門使華蓋入兩眉中間上升紫房七世父母罪解福生上登帝宫真思帝君絳凌梵真氣紫雲之色𦋇於頂上默呪曰帝君度符籍正氣召萬神上招玉真氣充布兩眉間混一生帝景三素成我仙飈粲乘飛蓋徑升髙上軒次思紫氣從兆泥丸中入兆乃口吸神雲咽津九過結作九神一神紅衮冕左四神青衣冠右四神白衣冠下入絳宫穿兩膀胱尾閭穴上衝泥丸兩眉中間紫戶之外宫順時吐息誦玉經大洞玉經曰玉帝有玄上之幡制命九天之階七覺得道者承道數歡熙神風回飈璨車名北停華紫英唱東玉色東琳和九霄外玉符徴太泥丸宫微三素神號生泥丸發曜金靈暉老君牢三素名張上守衛死節機玉清大和王祝曰扶晨始暉生紫雲映玄阿煥洞圎光曰名蔚晃朗濯耀曰名羅眇眇靈景曰元森灑空青華九天館玉賔金房唱霄歌賢哉對帝左仙伸成子賔役召伯幽車七祖解胞根世世為仙家髙上神霄玉清王祝曰丹皇運神名珠守鎮死門上一赤子玄帝天帝君名凝天一名伯無上亦曰三元先扶我養我形使我登雲輪常坐上清軒七玄為仙君畢乃口微祝曰天上內音珠鬱羅廣都靈地上外音長存體去害子大洞玉帝君消魔玉符訣曰當朱書黃繒佩之存呼帝君內諱名字鎮我紫戶之外神安紫房真靈交泰斷塞死孔永保華蓋乃叩齒九通次咽液三過上皇先生紫晨君道經第四左無英公子章謹請左無英公子玄充叔字合符子常守兆左腋之下肝之後戶死氣之門使左腋之下常有玉光引神明上入兩眼睛之中真思左無英公子玄充叔真氣玉光之色𦋇於頂上默呪曰無英神真生紫黃三氣混合成宫商招引真氣鎮膀胱通流三丹㑹洞房為我致仙變丹容飛升雲館入金墉次思玉光從兆泥丸中入兆乃口吸神雲咽津三過結作三神一神狀如秀士青錦袍玉束帶二神侍立下入右乳穿絳宫入左膀胱却入右膀胱上穿絳宫入左乳內過肝之後戶順時吐息誦玉經大洞玉經曰太冥絶九玄洞景寄神通玉帝乘朱霄緑霞煥金墉上館雲珠內仰投無玉京山創峯靈關太漠下靄沫鏡中空冥化混離血神子玄玄叔元母火王瑋寂髙同九父生無極保谷童圓塗無凝滯綺合有臺名九重南披七祖根西解纍業凶體嬌萬津波神生攝十方大歸反胎轅三合乘天龍玉清上皇中極寶景王祝曰神安氣洞上與天通越出地戶過度天門隱息四絶七星散分飛行隂鼻孔房日月植根守金藏玉制御萬神仙王何人我巳成真隱存雌雄玄洞雌一四宫四鄉結中有青氣號為案結神名延昌守曰和結神字嬰理命永長玄歸胎神名固內慶玄血神牢張我日成真飛仙雲京畢乃口微祝曰天上內音弗育邈散兆生地上外音盻常在法無輪大洞無英公子消魔玉符訣曰當朱書黃繒佩之存呼無英公子內諱名字鎮我左腋之下使玉光內映神明朗清塞斷死孔體合玉靈乃叩齒九通咽液九過太微天帝君道經第五右白元尊神章謹請右白元洞陽君鬱靈標字玄夷絶常守兆右腋之下肺之後戶死氣之門使右腋之下常有金光引神明入六氣之宫七祖父母反胎帝一身登玉房真思右白元洞陽君鬱靈標真氣金光之色𦋇於頂上默呪曰洞陽鬱靈寶魂生金光煥煥氣中精招真固神令長生拔出幽根基胎嬰驂晨御氣升上清次思金光從兆泥丸中入兆乃口吸神雲咽津三過結作三神一神狀如秀士紅錦袍玉束帶二神侍上下入左乳穿絳宫入右膀胱却入左膀胱上穿絳宫入右乳內過肺之後戶順時吐息誦玉經大洞玉經曰太微天帝君泥丸神八浮風入雲營神宗理靈襟龍山秀臺名玉京金房蔚明霞九戶欲孔朗髙瓊黃庭涉北元元父左回明元父字朱精洞陽君名啓明師白素君名幽寥登腎神上清四玄秉元禁長保五帝城玉清大帝君祝曰洞陽鬱靈神名標守體死戶門并出三尸積受入九真源解胞散滯血百節生正神七祖滅尸禍音禍拔殞後葉患音環黑氣斌來生胞神斫斷胞死根上世受道德後來獲帝先帝先是何人奣音礦明七葉孫乃祖入仙都併坐精上門畢乃口微祝曰天上內音超滯天橫冥始地上外音勃沙玄無定力大洞白元尊神消魔玉符訣曰當朱書黃繒佩之存呼白元內諱名字鎮我右腋之下令體映金光神明安寧六氣曜宫七祖反生乃叩齒九通咽液三過三元紫精君道經第六中央司命丈人君章謹請中央司命丈人君理明初字玄度卿常守兆絳宫心房之中血孔之戶死氣之門口吐紫雲之氣洞溢五藏之內使兆心中得神真之氣絳宫生五色之華真思中央司命丈人君理明初真氣紫雲之色𦋇於頂上默呪曰司命定年丈人保仙度名於南宫上奏帝君前世世為仙王拔度七葉根福報無窮巳皆是玉經言次思紫氣從兆泥丸中入兆乃口吸神雲咽津三過結作一神羽服仙巾狀如土星下布心內化了心形圎如皎月神坐月內順時吐息誦玉經大洞玉經曰紫精太無中三元上景衢秀朗寶太暉眇眇扇帝九幽敷伯史神名啓三氣素帝靈登玉虛慶氣育五靈司命神明初心神玉清消魔王祝曰㑹元三襟太微小童名交擕領回胎嬰承光弼卿守下關務玄白元君侍月明於是混赤氣君離固籥明車黃氣君受成福延十祖禍散玄生守景六合凌梵玉帝君名七靈共生億千歘升玉庭嬰兒俳徊羽衣命遷吉濟萬萬福布千千骨有玉映血成瓊泉生樂天地日月同年髙上神霄玉清王祝曰福布七玄前罪滅三塗中靈吹九晨杪納氣太帝北帝宫玉仙擕太一併位重冥空帝皇太一名遂隱上清室羽明帝一房畢乃口微祝曰天上內音騫苞庭盻猷已澄潧渟此三字是日內名密誦三遍地上外音幸長劫效萬靈大洞司命丈人君消魔玉符訣曰朱書黃繒佩之存呼丈人內諱名字鎮我絳宫心中五色結絡紫氣生華保神固命長生靈柯七祖解脫去離九河乃叩齒九通咽液三過真陽元老玄一君道經第七命門桃君章謹請命門桃君孩道康字合精延常守兆臍中之關命門內宫死氣之門使兆臍中徘徊黃雲盈溢三命生根胞結解泄令七世父毋纍殃無閡宿罪無滯世世獲度脫上生天帝宫真思命門桃君孩道康真氣黃雲之色𦋇於頂上默呪曰丹靈正神號曰桃君混合生宫守護命門通仙致氣齊景寶雲七祖同歡受福髙晨次思黃氣從兆泥丸中入兆乃口吸神雲咽津三過結作三神一神狀如金甲將軍二神侍立下入絳宫充於命門內宫順時吐息誦玉經大洞玉經曰真陽館名帝賔老受事㑹玉皇太道君滅魔除穢水百司詣絳宫逸宅丹玄心宫內五氣結十方七轉司命至三回召仙公太山主鬼者急校三官中髙上神霄玉清王祝曰五嶽真人定録四賔四門賓友司命促到護籍理民起非神名握節雲拘神名執幡香火八被惡魔絶烟並來對帝萬萬稱臣度我生籍名遷玉門扶翼五老愼護披陳玉清紫微帝君祝曰太上時非子康別名一曰合精延是為命門王可以召萬神萬神即時到合㑹瓊羽門使令散禍禍絶福連上寢玉堂世為名仙畢乃口微祝曰天上內音玄幄沙稱福神地上外音無生死入胎門大洞命門桃君消魔玉符訣曰當朱書黃繒佩之存呼桃君內諱名字鎮我臍中之關守固胞根斷絶死氣生血成仙七祖反胎更生南軒乃叩齒九通咽液三過上元大素三元君道經第八泥丸上一赤子章謹請泥丸天帝君上一赤子玄凝天字三元先常守兆泥丸九孔之戶死氣之門使兆泥丸玉堅金曜映真體生寶光九孔受靈令七祖父母長得安寧解脫宿罪共登上清真思泥丸天帝君上一赤子玄凝天真氣寶光之色𦋇於頂上默呪曰上一赤子號上真飛雲羽衣曜紫烟上招門景對帝賔寶光奕奕映我身身生羽翼升九天次思寶光從兆泥丸中入兆乃口吸神雲咽津三過結作三神狀如三清紫衣冠下入絳宫穿兩膀胱尾閭穴上入脊髓穿第一椎骨入泥丸內宫順時吐息誦王經大洞玉經曰太素三素母三華氣晨玉清光燈廣靈堂上清房名玉賔表玄籍守命孩道康桃康名徊風散萬魔金符召度卿神名輔衛地戶內保此長生王真成髙上消魔玉清王祝曰童子景精太微名有神有威合象三形九道相推衣服朱丹步武嵾嵯出入上元太極內階北極辰星知我者長生存我者不衰人無哭兆恃賴辟非欲知吾處密問太微太微玉帝三聖徘徊使我左右一合俱飛混洞六府日月齊暉太上玉清王祝曰九道九星轉對五老五神各寧洞陽白元銜籍號曰鬱靈白元君名七世父母反胎更生纍葉積罪罪泄福生上入帝室受書丹明書名常與伯史原下一真元王徘徊三界庭巾金佩羽寶曜負形玉輪北回役御朱兵畢乃口微祝曰天上內音明柱子會和存地上外音扶天命登明曜大洞泥丸天帝君上一赤子消魔玉符訣曰當朱書黃繒佩之存呼赤子內諱名字鎮我泥丸之中令死氣沉藏七祖升飛上宴帝堂乃叩齒九通次咽液三過上清大洞真經卷之二
