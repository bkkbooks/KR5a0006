front:
  text: 上清大洞眞經卷之三荒七
  hash: sha256:f98adf570765c46bb001f1b2027d21953a5bd1a61e56cff3a185396a49185053
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0006_HFL_003-001a, image: hfl/0017/0017-004.png}
body:
  text: 茅山上清三十八代宗師蔣宗瑛校勘上清紫精三素君道經第九絳宫中一元君章謹請絳宫心丹田宫中一元丹皇君神運珠字子南丹常守兆項中大椎骨首之户死炁之門使兆百骨受眞炁大椎有日光七祖父母得道登仙入南極之宫眞思絳宫中一元丹皇君神運珠眞炁日光之色𦋇於頂上黙呪曰中一眞君號曰運珠上招日光灌我形軀三眞寳曜固命玉符壽億萬劫永無終休身生羽服飛昇天衢次思日光從兆泥丸中入兆乃口吸神雲咽津三過結作一神紅衮冕下布絳宫採先入藏者神精光曜盡纒於神身下入臍内又入玉莖中却入尾閭穴穿脊髓上入第一椎骨首之戸出化爲一輪百寳神光如日之狀其光急轉神在光内不動其神背觀順時吐息誦玉經大洞玉經曰紫精上淸大中育華林木名長瞑太無外玉房眉間生寳雲九扇胞胎内帝賔奉五符三元回紫蓋蒼玉斌來生衞此長夜會至隂之源五籍旣明啓昌開明得期務玄把籙奉行四時金映兩目華蓋秀眉玄母歸雄隂變陽元父合雌陽變隂合洞百靈辟非宣彌童子受聽丹嬰爲兒旤絶地下福昇仙臺䰟魄宻靜百神合離間關書名帝一混然俱來玉清保仙王祝曰天有九䰟九天之精不可不分三丹四神道有三眞不可去身帝一變景萬化以臻流珠停暉紫霞踊烟七度七星纏度冋路三光映眞太一精符相與爲親司命衘月嘘我重唇五老神名衘日煉陽吸我三便太上道君與我纒綿上造大階擕把太眞畢乃口微祝曰天上内音樂伯勒飛㝠賢地上外音始生王上道宗大洞絳宫中一元丹皇君消魔玉符訣曰當朱書黃繒佩之存呼皇君内諱名字鎭我項中首骨鎭塞九孔炁生神固玉堂解散七玄旤翻然飛玄梁乃叩齒九通次咽液三過青靈陽安元君道經第十命門下一黄庭元王章謹請命門下一黃庭元王始明精字元陽昌常守兆兩胯之間車軸之戸死炁之門使兆百血凝結神炁不散拔出地戸超度八難眞思命門下一黃庭元王始明精眞炁月光之色罩於頂上黙微呪曰下一眞元王號曰始明精三皇把符命金契度仙庭上招景中炁炁布灌我形羽車曜雲羅令我昇上清次思月光從兆泥丸中入兆乃口吸神雲咽津三過結作三神一神狀如月帝黃衮冕二神亦黃衣侍立下入絳宫下眞元王下入大腸出懸於空中二神入兩膀胱穿兩腿髓内下至湧泉穴出兩脚根二神各負半月倒上合於虛中元王上充腰間車軸之戸合爲圓月月形無窮映了身形順時吐息誦玉經大洞玉經曰青靈東神扇八炁鼓輪三華城拔出胞胎結七世受福生宿對滅五道長守帝一營九徊七步度散此胞根三皇三元之主巾朱把符命神赤帝南和帝子握節上遷併我䰟魄煉精帝前五符金契七玄入仙慶流雲積福盈龍泉凌梵履昌日日上言生籍已明五炁合延髙上消魔玉清王祝曰五藏百結生此衆疾玄一林虛老子名林虛夫開關解結結絶病散神精盈溢福炁充明旤翳傾竭仙心日臻死道月絶混化九君合符帝一七神奉符公子無英入室畢乃口微祝曰天上内音望昌竭順萬烟地上外音連劫生厥出天大洞命門下一黃庭元王消魔玉符訣曰當黃書白繒佩之存呼元王内諱名字鎭我兩胯之間内華朗耀百神凝精反色嬰童翻然超升乃叩齒九通咽液三過皇清洞眞道君道經第十一泥丸九眞章謹請泥丸九眞帝昌上皇字先靈元宗常守兆口之四際死炁之門使精光入故炁出神光隨身放光萬丈七祖父母罪脫旤除生在帝君玉房之中眞思泥丸九眞帝昌上皇眞炁青光萬丈罩於頂上黙微呪曰九眞始生生於上元號曰先靈三景各分上招玄暉流布四門鎭神保仙拔度七玄驂景乗浮朝拜三元次思青炁從兆泥丸中入兆乃口吸神雲咽津九過結作九大神青衮冕下布一身至兩脚底上充五藏滿上充華蓋入兩耳入鼻凹分入兩目閉目摇睛二七度其神迸出泥丸外各帶青光萬丈神髙去身五丈各口吐一青蓮葉炁上蓊結一青華蓋順時吐息誦玉經大洞玉經曰皇清道君號洞眞三帝三元君合生啓明簫刃下關神名金門濟披青日中赤帝號曰丹靈日神靈符命仙五籍保生虹映日帝玉華月童煥落上清七世父母累命重寜散此宿對滅旤幽㝠公子無英執五符太一居玄丹君紫房三合地戸下㧞命玉帝宫腦中少女郁墨子斗諱衞兆七炁牎拘制明血液左耳神盈滿五藏充玉清洞明胎王祝曰七炁離羅大混黃寧精血神六甲陽神輔䰟内注六丁隂神三眞精炁神入胃流液太明心宿五符上皇泥丸常生九眞泥丸九眞下映日母譚正㑹條同軿㳺盻徘徊𩀱蓋華嬰上到紫房披巾羽青七世父母各得反生畢乃口微祝曰天上内音迴素充吉來靜地上外音大福子長天生正薈條此三字是三元君内名誦至此宜宻念大洞泥丸九眞帝昌上皇消魔玉符訣曰當青書赤繒佩之存呼九眞内諱名字鎭我口之四際爲我固塞死門九孔受靈反胎三天上升帝庭七祖免難更受始生乃叩齒九通咽液九過髙上太素君道經第十二膽中八眞章謹請膽中八眞合景君字北臺玄精常守兆背窮骨之下節死炁之門使兆背窮骨受生炁隂邪炁不千下節孔常閉眞光映於兆形證上清之仙位眞思膽中八眞合景君眞炁黃雲之色罩於頂上黙微呪曰八眞法神神生九天號曰北臺君常在三合間招眞洞明炁下流布我身身生紫暉與帝結親擕挈五老太仙纒綿次思黃炁從兆泥丸中入兆乃口吸神雲咽津八過結作八神黄衮冕穿尾閭上充背窮骨下節之戸復出其神羅列兩邊順時吐息誦玉經大洞玉經曰髙上宴紫霄五老輔玉根玉淸中山名太素拂眇景合符帝一前白帝皓白帝名鬱將迴金帝字太霞郷度我死戸下拔岀三塗梁圓華黄刅黄素元君太張神名守關胎結四開胞血滅連保身冥眞帝一共遷兆有五藏各生華根穢液沉没生朱運仙九迴㑹幽六府曲申上帝元父熈怡玄毋元母懷歡玉門生香蘭室含珍月精凌輝日爽日君諱八騫月中樹太一啓珠左夫人名守我面前髙上消魔玉清王祝曰生生得帝心各㑹重戸内紫房混五神䰟魄常寳貴七關受仙輝五藏充玉炁俱過水火天披建四和蔚上歸魄神皇一子與兆䰟相對畢乃口微祝曰天上内音和歸落結舒永地上外音出常外萬劫浩大洞膽中八眞合景君消魔玉符訣曰當黃書白繒佩之存呼合景君内諱名字鎭我背窮骨之下爲我固録内眞養性凝精死炁斷塞受生更形乃叩齒九通咽液八過皇上四老道中君道經第十三七眞玄陽君章謹請兩腎七眞玄陽君字㝠光生常守兆背之窮骨九地之戸死炁之門使地戸伏生炁窮骨受神液六津調滿生根深密眞思腎中七眞玄陽君眞炁玄雲之色𦋇於頂上黙微呪曰七眞生帝景八炁運常寧上招日中童圓珠映我形徊風混幽府歸妙大洞經拔出地戸難超凌逸九天次思玄雲之炁從兆泥丸中入兆乃口吸神雲咽津七過結作七神披髮跣足入絳宫分入兩膀胱穿尾閭穴上充兩腎出背窮骨順時吐息誦玉經大洞玉經曰皇上超無景音影輪轉九曜生日名徊風混帝心八炁運常寧廣霞山名叅神天五帝日帝敷日精液逸元中膜血凝五華平體寳圓日精珠映流曜拔兆形號爲受逸阜口中皆帝名亦曰澄潧渟日中黑帝名俱濟三滅關啓籍登太明令我保仙眞七世披緑青元始炁解旤㝠塗下起福晨上靈世世登玉郷玉虛境七祖反胎嬰大上玉清三元王祝曰太一鬱書斗中大女上登洞房六合眉後三賔三神司命神公手執籙籍駕景乗龍左徊靈曜右扇神風峨峨隱珠日中夫人芬艶嬰蒙浩觀太無濯煉五通澄䰟羽幽錬魄空同招兆百神月帝告功七祖順生景福昌隆回我老艾還反玄童上對神霄金光十方飛飈玉輪彈金鳴鍾畢乃口微祝曰天上内音三樂深五逹門地上外音法輪回道上生大洞七眞玄陽君消魔玉符訣曰當黃書白繒佩之存呼玄陽君内諱名字鎭我背窮骨地戸爲我通天生炁固塞死道六津凝精長生不老乃叩齒九通咽液七過玉晨太上大道君道經第十四肺中六眞章謹請肺中六眞上元素玉君字梁南中童常守兆頸外十二間梁死炁之門使上帝玉華光映神門之下玉晨正炁流入丹元之宫令七祖父母解散胎結之滯受生太上之郷眞思肺中六眞上元素玉君眞炁白雲之色𦋇於頂上黙微呪曰六眞奕奕白光映映回帝之景上入丹郷招眞下流灌我玉霜羽裙紛紛衣我仙裳越過水火飛登晨京次思白炁從兆泥丸中入兆乃口吸神雲咽津六過結作六神狀如金星淡碧衣冠下入絳宫入兩膀胱穿尾閭穴夾眷上入泥丸分兩耳上下入十二間梁之外神面相向立順時吐息誦玉經大洞玉經曰玉晨大道君九天司太上大道生常保景化内九迴鏡上清解帶玉映室玉晨宫乗素入四明上淸兩門擕提日中王併羽月晨靈太一召天魔帝君校萬精拔過死積炁越度仙皇庭帝立三關上八風舞神兵左把福醴液右提慶源瓶太素玉清王祝曰九合三離紫房散分五老正嚴帝一保神司命奏籍奉符三元胞𣗳斷落血尸絶根反胞朱火回炁泥丸我合九仙大混百神身登玉房同軿金仙道遥太素仰回三天重華列簡累枝流玄世爲道伯大福纒綿上寢玉清下息命門五藏秀華項負日䰟長保劫齡後天常存畢乃口微祝曰天上内音泓鬱霞度法全地上外音重劫視滅長苦大洞肺中六眞上元素玉君消魔玉符訣曰當朱書黃繒佩之存呼素玉君内諱名字鎭我十二間梁斷塞死戸固我丹元披解七祖之䰟上生南宫之中乃叩齒六通咽液六過太清大道君道經第十五脾中五眞章謹請脾中五眞養光君字太昌子常守兆喉中極根之戸死炁之門使兆玉光金眞洞照喉根之内太帝晨炁來徃三宫之中眞思脾中五眞養光君眞炁嬌鶯之色𦋇於頂上黙微呪曰五眞散靈炁布丸玄金光曜暉玉炁吐津萬神並唱熈怡我身圓光奏命籍太一勒九天降志八景輿䇿龍駕紫烟混合三帝室保我萬劫年次思玉光金眞之炁從兆泥丸中入兆乃口吸神雲咽津五過結作五神狀如土星下入絳宫分左二右三入兩膀胱穿尾閭穴夾脊上入泥丸穿兩臉下布兩極根之戸左二右三而住順時吐息誦玉經大洞玉經曰太清浮絶空山名三天寳神符日中開五暉青帝圓常無日帝諱捧籍登太明受籙金華樓太淸天中五藏植玉根䰟魄一凝和百神合㑹固身守關地戸閉塞死亡不干檢炁九玄超越八難七世父母胎結披散生度南宫朱陵中反胎三積三尸内玄母叔火王玄母名爲兆得仙位玉清大道君祝曰晨登九景臺夕入神霄門太一神夫子或曰三來瓮斗中内嬪名左執兆符籍右擕洞陽君定生會紫房五神交渾分渾分逸帝室七祖絶死根五毒炁零㓕翳津無浮連令我血尸化帝房出金光三塗絶苦樹世世獲天仙常與景中王積劫保元元畢乃口微祝曰天上内音明考梨抜劫阿地上外音濟無生得來願大洞脾中五眞養光君消魔玉符訣曰當朱書黃繒佩之存呼養光君内諱名字鎭我喉根之戸固塞死門使金眞内映保華停年領攝三宫安神定炁玉華結絡九府胎仙乃叩齒五通咽液五過太極大道元景君道經第十六肝中四眞章謹請肝中四眞青明君字明輪童子常守兆胃脘之戸膏膜之下死炁之門使三素之炁生華五淳之神侍衞出入玉液灌澤胃宫眞思肝中四眞青明君眞炁青雲之色罩於頂上乃黙呪曰四眞常生青光華精徘徊秀朗炁沉冥玉景庭提擕髙上元俯仰要五靈拔解七葉根與我保華嬰次思青炁從兆泥丸中入兆乃口吸神雲咽津四過結作四神青衣冠下布胃脘之戸膏膜之下神與司命丈人爲侍立左三右二順時吐息誦玉經大洞玉經曰太極元景王太極王者三天攝神生紫素翳鬰刅紫素名安來紫素字上華京拔出五苦積反胎七元庭七玄解重結累祖絡錦青徘徊秀華山名下俯仰要平聲五靈兆身升玉堂五神回孩嬰俱濟太漠外養素朝圓明髙上神霄玉清王祝曰帝室混身一道萬分萬分合别是曰帝一白帝皓靈日帝名金霞迴日重冥幽寥隂神名藏神化密把兆五符與天相畢玉暉覆蓋無死無疾七祖父母超登丹室胞根八解死符絶滅帝得五元我回三七六府煥華金書羽札世爲眞仙寳籙玄别華繁曾玄世無曲折畢乃口微祝曰天上内音徊因明神初羅地上外音暉履安固止身大洞肝中四眞青明君消魔玉符訣曰當朱書青繒佩之存呼青明君内諱荒七十七名字鎭我胃脘之戸斷死炁於玄門受生神於自然固三素於九府明咽玉液以灌眞乃叩齒四通咽液四過上清大洞眞經卷之三
