front:
  text: 上清大洞真經卷之三荒七
  hash: sha256:bac045d78d0445f17f0faf2a4b8707b6c77135e79588b976148e3a9ed8f5536b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0006_HFL_003-001a, image: hfl/0017/0017-004.png}
body:
  text: 茅山上清三十八代宗師蔣宗瑛校勘上清紫精三素君道經第九絳宫中一元君章謹請絳宫心丹田宫中一元丹皇君神運珠字子南丹常守兆項中大椎骨首之户死氣之門使兆百骨受真氣大椎有日光七祖父母得道登仙入南極之宫真思絳宫中一元丹皇君神運珠真氣日光之色𦋇於頂上默呪曰中一真君號曰運珠上招日光灌我形軀三真寶曜固命玉符壽億萬劫永無終休身生羽服飛升天衢次思日光從兆泥丸中入兆乃口吸神雲咽津三過結作一神紅衮冕下布絳宫採先入藏者神精光曜盡纒於神身下入臍內又入玉莖中却入尾閭穴穿脊髓上入第一椎骨首之戶出化為一輪百寶神光如日之狀其光急轉神在光內不動其神背觀順時吐息誦玉經大洞玉經曰紫精上淸大中育華林木名長瞑太無外玉房眉間生寶雲九扇胞胎內帝賔奉五符三元回紫蓋蒼玉斌來生衛此長夜會至隂之源五籍既明啓昌開明得期務玄把籙奉行四時金映兩目華蓋秀眉玄母歸雄隂變陽元父合雌陽變隂合洞百靈辟非宣彌童子受聽丹嬰為兒禍絶地下福升仙臺魂魄密靜百神合離間關書名帝一混然俱來玉清保仙王祝曰天有九魂九天之精不可不分三丹四神道有三真不可去身帝一變景萬化以臻流珠停暉紫霞踊烟七度七星纏度坰路三光映真太一精符相與為親司命銜月噓我重唇五老神名銜日煉陽吸我三便太上道君與我纒綿上造大階擕把太真畢乃口微祝曰天上內音樂伯勒飛冥賢地上外音始生王上道宗大洞絳宫中一元丹皇君消魔玉符訣曰當朱書黃繒佩之存呼皇君內諱名字鎮我項中首骨鎮塞九孔氣生神固玉堂解散七玄禍翻然飛玄梁乃叩齒九通次咽液三過青靈陽安元君道經第十命門下一黃庭元王章謹請命門下一黃庭元王始明精字元陽昌常守兆兩胯之間車軸之戶死氣之門使兆百血凝結神氣不散拔出地戶超度八難真思命門下一黃庭元王始明精真氣月光之色罩於頂上默微呪曰下一真元王號曰始明精三皇把符命金契度仙庭上招景中氣氣布灌我形羽車曜雲羅令我升上清次思月光從兆泥丸中入兆乃口吸神雲咽津三過結作三神一神狀如月帝黃衮冕二神亦黃衣侍立下入絳宫下真元王下入大腸出懸於空中二神入兩膀胱穿兩腿髓內下至湧泉穴出兩腳根二神各負半月倒上合於虛中元王上充腰間車軸之戶合為圓月月形無窮映了身形順時吐息誦玉經大洞玉經曰青靈東神扇八氣鼓輪三華城拔出胞胎結七世受福生宿對滅五道長守帝一營九徊七步度散此胞根三皇三元之主巾朱把符命神赤帝南和帝子握節上遷併我魂魄煉精帝前五符金契七玄入仙慶流雲積福盈龍泉凌梵履昌日日上言生籍已明五氣合延髙上消魔玉清王祝曰五藏百結生此衆疾玄一林虛老子名林虛夫開關解結結絶病散神精盈溢福氣充明禍翳傾竭仙心日臻死道月絶混化九君合符帝一七神奉符公子無英入室畢乃口微祝曰天上內音望昌竭順萬烟地上外音連劫生厥出天大洞命門下一黃庭元王消魔玉符訣曰當黃書白繒佩之存呼元王內諱名字鎮我兩胯之間內華朗耀百神凝精反色嬰童翻然超升乃叩齒九通咽液三過皇清洞真道君道經第十一泥丸九真章謹請泥丸九真帝昌上皇字先靈元宗常守兆口之四際死氣之門使精光入故氣出神光隨身放光萬丈七祖父母罪脫禍除生在帝君玉房之中真思泥丸九真帝昌上皇真氣青光萬丈罩於頂上默微呪曰九真始生生於上元號曰先靈三景各分上招玄暉流布四門鎮神保仙拔度七玄驂景乘浮朝拜三元次思青氣從兆泥丸中入兆乃口吸神雲咽津九過結作九大神青衮冕下布一身至兩腳底上充五藏滿上充華蓋入兩耳入鼻凹分入兩目閉目搖睛二七度其神迸出泥丸外各帶青光萬丈神髙去身五丈各口吐一青蓮葉氣上蓊結一青華蓋順時吐息誦玉經大洞玉經曰皇清道君號洞真三帝三元君合生啓明簫刃下關神名金門濟披青日中赤帝號曰丹靈日神靈符命仙五籍保生虹映日帝玉華月童煥落上清七世父母纍命重寧散此宿對滅禍幽冥公子無英執五符太一居玄丹君紫房三合地戶下拔命玉帝宫腦中少女郁墨子斗諱衛兆七氣窗拘制明血液左耳神盈滿五藏充玉清洞明胎王祝曰七氣離羅大混黃寧精血神六甲陽神輔魂內注六丁隂神三真精氣神入胃流液太明心宿五符上皇泥丸常生九真泥丸九真下映日母談正㑹條同軿遊盻徘徊𩀱蓋華嬰上到紫房披巾羽青七世父母各得反生畢乃口微祝曰天上內音回素充吉來靜地上外音大福子長天生正薈條此三字是三元君內名誦至此宜密念大洞泥丸九真帝昌上皇消魔玉符訣曰當青書赤繒佩之存呼九真內諱名字鎮我口之四際為我固塞死門九孔受靈反胎三天上升帝庭七祖免難更受始生乃叩齒九通咽液九過髙上太素君道經第十二膽中八真章謹請膽中八真合景君字北臺玄精常守兆背窮骨之下節死氣之門使兆背窮骨受生氣隂邪氣不千下節孔常閉真光映於兆形證上清之仙位真思膽中八真合景君真氣黃雲之色罩於頂上默微呪曰八真法神神生九天號曰北臺君常在三合間招真洞明氣下流布我身身生紫暉與帝結親擕挈五老太仙纒綿次思黃氣從兆泥丸中入兆乃口吸神雲咽津八過結作八神黃衮冕穿尾閭上充背窮骨下節之戶復出其神羅列兩邊順時吐息誦玉經大洞玉經曰髙上宴紫霄五老輔玉根玉淸中山名太素拂眇景合符帝一前白帝皓白帝名鬱將回金帝字太霞鄉度我死戶下拔出三塗梁圓華黃創黃素元君太張神名守關胎結四開胞血滅連保身冥真帝一共遷兆有五藏各生華根穢液沉沒生朱運仙九回㑹幽六府曲申上帝元父熙怡玄毋元母懷歡玉門生香蘭室含珍月精凌輝日爽日君諱八騫月中樹太一啓珠左夫人名守我面前髙上消魔玉清王祝曰生生得帝心各㑹重戶內紫房混五神魂魄常寶貴七關受仙輝五藏充玉氣俱過水火天披建四和蔚上歸魄神皇一子與兆魂相對畢乃口微祝曰天上內音和歸落結舒永地上外音出常外萬劫浩大洞膽中八真合景君消魔玉符訣曰當黃書白繒佩之存呼合景君內諱名字鎮我背窮骨之下為我固録內真養性凝精死氣斷塞受生更形乃叩齒九通咽液八過皇上四老道中君道經第十三七真玄陽君章謹請兩腎七真玄陽君字冥光生常守兆背之窮骨九地之戶死氣之門使地戶伏生氣窮骨受神液六津調滿生根深密真思腎中七真玄陽君真氣玄雲之色𦋇於頂上默微呪曰七真生帝景八氣運常寧上招日中童圓珠映我形徊風混幽府歸妙大洞經拔出地戶難超凌逸九天次思玄雲之氣從兆泥丸中入兆乃口吸神雲咽津七過結作七神披髮跣足入絳宫分入兩膀胱穿尾閭穴上充兩腎出背窮骨順時吐息誦玉經大洞玉經曰皇上超無景音影輪轉九曜生日名徊風混帝心八氣運常寧廣霞山名參神天五帝日帝敷日精液逸元中膜血凝五華平體寶圓日精珠映流曜拔兆形號為受逸阜口中皆帝名亦曰澄潧渟日中黑帝名俱濟三滅關啓籍登太明令我保仙真七世披緑青元始氣解禍冥塗下起福晨上靈世世登玉鄉玉虛境七祖反胎嬰大上玉清三元王祝曰太一鬱書斗中大女上登洞房六合眉後三賔三神司命神公手執籙籍駕景乘龍左徊靈曜右扇神風峨峨隱珠日中夫人芬艷嬰蒙浩觀太無濯煉五通澄魂羽幽錬魄空同招兆百神月帝告功七祖順生景福昌隆回我老艾還反玄童上對神霄金光十方飛飈玉輪彈金鳴鍾畢乃口微祝曰天上內音三樂深五逹門地上外音法輪回道上生大洞七真玄陽君消魔玉符訣曰當黃書白繒佩之存呼玄陽君內諱名字鎮我背窮骨地戶為我通天生氣固塞死道六津凝精長生不老乃叩齒九通咽液七過玉晨太上大道君道經第十四肺中六真章謹請肺中六真上元素玉君字梁南中童常守兆頸外十二間梁死氣之門使上帝玉華光映神門之下玉晨正氣流入丹元之宫令七祖父母解散胎結之滯受生太上之鄉真思肺中六真上元素玉君真氣白雲之色𦋇於頂上默微呪曰六真奕奕白光映映回帝之景上入丹鄉招真下流灌我玉霜羽裙紛紛衣我仙裳越過水火飛登晨京次思白氣從兆泥丸中入兆乃口吸神雲咽津六過結作六神狀如金星淡碧衣冠下入絳宫入兩膀胱穿尾閭穴夾眷上入泥丸分兩耳上下入十二間梁之外神面相向立順時吐息誦玉經大洞玉經曰玉晨大道君九天司太上大道生常保景化內九回鏡上清解帶玉映室玉晨宫乘素入四明上淸兩門擕提日中王併羽月晨靈太一召天魔帝君校萬精拔過死積氣越度仙皇庭帝立三關上八風舞神兵左把福醴液右提慶源瓶太素玉清王祝曰九合三離紫房散分五老正嚴帝一保神司命奏籍奉符三元胞𣗳斷落血尸絶根反胞朱火回氣泥丸我合九仙大混百神身登玉房同軿金仙道遙太素仰回三天重華列簡纍枝流玄世為道伯大福纒綿上寢玉清下息命門五藏秀華項負日魂長保劫齡後天常存畢乃口微祝曰天上內音泓鬱霞度法全地上外音重劫視滅長苦大洞肺中六真上元素玉君消魔玉符訣曰當朱書黃繒佩之存呼素玉君內諱名字鎮我十二間梁斷塞死戶固我丹元披解七祖之魂上生南宫之中乃叩齒六通咽液六過太清大道君道經第十五脾中五真章謹請脾中五真養光君字太昌子常守兆喉中極根之戶死氣之門使兆玉光金真洞照喉根之內太帝晨氣來往三宫之中真思脾中五真養光君真氣嬌鶯之色𦋇於頂上默微呪曰五真散靈氣布丸玄金光曜暉玉氣吐津萬神並唱熙怡我身圓光奏命籍太一勒九天降志八景輿䇿龍駕紫烟混合三帝室保我萬劫年次思玉光金真之氣從兆泥丸中入兆乃口吸神雲咽津五過結作五神狀如土星下入絳宫分左二右三入兩膀胱穿尾閭穴夾脊上入泥丸穿兩臉下布兩極根之戶左二右三而住順時吐息誦玉經大洞玉經曰太清浮絶空山名三天寶神符日中開五暉青帝圓常無日帝諱捧籍登太明受籙金華樓太淸天中五藏植玉根魂魄一凝和百神合㑹固身守關地戶閉塞死亡不干檢氣九玄超越八難七世父母胎結披散生度南宫朱陵中反胎三積三尸內玄母叔火王玄母名為兆得仙位玉清大道君祝曰晨登九景臺夕入神霄門太一神夫子或曰三來瓮斗中內嬪名左執兆符籍右擕洞陽君定生會紫房五神交渾分渾分逸帝室七祖絶死根五毒氣零滅翳津無浮連令我血尸化帝房出金光三塗絶苦樹世世獲天仙常與景中王積劫保元元畢乃口微祝曰天上內音明考梨拔劫阿地上外音濟無生得來願大洞脾中五真養光君消魔玉符訣曰當朱書黃繒佩之存呼養光君內諱名字鎮我喉根之戶固塞死門使金真內映保華停年領攝三宫安神定氣玉華結絡九府胎仙乃叩齒五通咽液五過太極大道元景君道經第十六肝中四真章謹請肝中四真青明君字明輪童子常守兆胃脘之戶膏膜之下死氣之門使三素之氣生華五淳之神侍衛出入玉液灌澤胃宫真思肝中四真青明君真氣青雲之色罩於頂上乃默呪曰四真常生青光華精徘徊秀朗氣沉冥玉景庭提擕髙上元俯仰要五靈拔解七葉根與我保華嬰次思青氣從兆泥丸中入兆乃口吸神雲咽津四過結作四神青衣冠下布胃脘之戶膏膜之下神與司命丈人為侍立左三右二順時吐息誦玉經大洞玉經曰太極元景王太極王者三天攝神生紫素翳鬱創紫素名安來紫素字上華京拔出五苦積反胎七元庭七玄解重結纍祖絡錦青徘徊秀華山名下俯仰要平聲五靈兆身升玉堂五神回孩嬰俱濟太漠外養素朝圓明髙上神霄玉清王祝曰帝室混身一道萬分萬分合别是曰帝一白帝皓靈日帝名金霞回日重冥幽寥隂神名藏神化密把兆五符與天相畢玉暉覆蓋無死無疾七祖父母超登丹室胞根八解死符絶滅帝得五元我回三七六府煥華金書羽札世為真仙寶籙玄别華繁曾玄世無曲折畢乃口微祝曰天上內音徊因明神初羅地上外音暉履安固止身大洞肝中四真青明君消魔玉符訣曰當朱書青繒佩之存呼青明君內諱荒七十七名字鎮我胃脘之戶斷死氣於玄門受生神於自然固三素於九府明咽玉液以灌真乃叩齒四通咽液四過上清大洞真經卷之三
