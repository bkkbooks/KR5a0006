front:
  text: 上清大洞眞經卷之二荒六
  hash: sha256:66e923049edf5e080919a5ed8966ab1b013e172c548cde25c0edf0fa59f3310b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0006_SJB_002-010520a, image: sjb/01/010520a.png}
body:
  text: 茅山上清三十八代宗師蔣宗瑛校勘髙上虚皇君道經第一太微小童章謹請太微小童干景精字㑹元子常守兆舌本之下死炁之門口吐赤雲繞兆一身化生血液上凝泥丸泥丸堅明百神方位眞思太微小童干景精眞炁赤雲之色𦋇於頂上黙呪曰眞炁下流充幽關鎭神固精塞死源玉經慧朗通萬神爲我致眞命長存拔度七祖反胎仙制鍊百神一炁全次思赤炁從兆泥丸中入兆乃口吸神雲咽津三過結作三神一神狀如天蓬大將二神侍立下布兆肝内遊遍却入心内絳宫上充舌本之下血液之府順時吐息誦玉經先以左手按捻鼻間人中次誦經大洞玉經曰髙上洞元兀生九天炁祖太无衆風亂玄玄曽絶散四清撫閑帝大洞尊君號一上景連衆攝烟長契一運七世投閑託靈屬命反華自然泯邈流虚六曜沉遷陵梵玉帝君名衘暉西華白帝字名彰安併編帝簡盡得解源胎符田田𨗉宻處路世發玉蘭靈光八暉混生萬神玉清消魔王柷曰天有大隱心生之寳稱曰明心梁之上辟非烟炁守我絶塞之下腎戸更受生牢門命門之外廼又召益元鼻神之羽童列於緑人中室之軒使解七祖百結隨風離根配天遷基達變入玄元素髙上神霄玉清王祝曰元氣本非生五塗承五行虚出雌䧺寄隂陽神化森羅𨗉幽鬱玉音響太和萬唱无中發仙庭回九變百混同得一易有西北天門名合虚中俱入帝堂㑹畢乃口微柷曰天上内音三藍羅波逮臺地上外音天命長人恒寧大洞太微小童消魔玉符訣曰當青書黄繒佩之存呼小童内諱名字鎭我舌本之下固液凝神斷塞死源乃叩齒九通次再咽液三過上皇玉虚君道經第二太一尊神章謹請太一尊神務猷收字歸㑹昌常守兆玉枕之下泥丸後戸死炁之門使生眞炁入于泥丸七祖父母受玄更生上籍玉皇重華萬寧眞思太一尊神務猷收眞炁紫雲之色𦋇於頂上黙呪曰太一保命固神定生爲我上招帝眞之炁下布紫戸之庭玉經仰徹九玄朗明七祖同歡俱昇上清次思紫炁從兆泥丸中入兆乃口吸神雲咽津三過結作三神狀如木星紫衣冠下入絳宫穿尾閭穴上衝泥丸後戸玉枕之下三神並立神目内觀紫戸順時吐息誦玉經大洞玉經曰玉虚太空順玄太一精䰟歸天晨雌一金霄雄一遊朗朗生帝雄一神名景欻巳宴玉雌一神洲左攝太微小童始童神右命起恒帝卿名扶明眞曰名煥九霄三日三天之日映玄北極敷干景太微小童併生衿内有幽寥太一字无令我得長年千劫始一周黄録保德刅披錦入神神室丘太一神名務命根公子无英召合符玉清元始王祝曰兆身常死關結胎害百神百神解胎結披散胞内根七祖入帝帝一室室一體合神仙神仙㑹玉胸中堂七祖生南宫併帶理明心神初同帝孩道始生之室康萬眞守身形是曰藏初明帝一回雌雄休鎭百神門閉塞萬邪戸受事九宫腦中聞典禁召司陽神命三日朝泥丸畢乃口微祝曰天上内音離堂合推運入地上外音延天骨辟毒龍大洞太一尊神消魔玉符訣曰當朱書青繒佩之存呼太一内諱名字鎭我泥丸後戸之外閉塞死炁之路通理幽關之際解七祖於五難度更生於交帶乃叩齒九通次咽液九過皇上玉帝君道經第三玉帝君章謹請帝君絳凌梵字履昌靈常守兆兩眉中間紫戸外宫死炁之門使華蓋入兩眉中間上昇紫房七世父母罪解福生上登帝宫眞思帝君絳凌梵眞炁紫雲之色𦋇於頂上黙呪曰帝君度符籍正炁召萬神上招玉眞炁充布兩眉間混一生帝景三素成我仙飈粲乗飛蓋徑昇髙上軒次思紫炁從兆泥丸中入兆乃口吸神雲咽津九過結作九神一神紅衮冕左四神青衣冠右四神白衣冠下入絳宫穿兩膀胱尾閭穴上衝泥丸兩眉中間紫戸之外宫順時吐息誦玉經大洞玉經曰玉帝有玄上之旛制命九天之階七覺得道者承道數歡熈神風回飈璨車名北停華紫英唱東玉色東琳和九霄外玉符徴太泥丸宫微三素神號生泥丸發曜金靈暉老君牢三素名張上守衞死節機玉清大和王祝曰扶晨始暉生紫雲映玄阿煥洞圎光曰名蔚晃朗濯耀曰名羅眇眇靈景曰元森灑空青華九天舘玉賔金房唱霄歌賢哉對帝左仙伸成子賔役召伯幽車七祖解胞根世世爲仙家髙上神霄玉清王祝曰丹皇運神名珠守鎭死門上一赤子玄帝天帝君名凝天一名伯无上亦曰三元先扶我養我形使我登雲輪常坐上清軒七玄爲仙君畢乃口微祝曰天上内音珠鬱羅廣都靈地上外音長存體去害子大洞玉帝君消魔玉符訣曰當朱書黄繒佩之存呼帝君内諱名字鎭我紫戸之外神安紫房眞靈交泰斷塞死孔永保華蓋乃叩齒九通次咽液三過上皇先生紫晨君道經第四左無英公子章謹請左無英公子玄充叔字合符子常守兆左腋之下肝之後戸死炁之門使左腋之下常有玉光引神明上入兩眼睛之中眞思左無英公子玄充叔眞炁玉光之色𦋇於頂上黙呪曰無英神眞生紫黄三炁混合成宫商招引眞炁鎭膀胱通流三丹㑹洞房爲我致仙變丹容飛昇雲舘入金墉次思玉光從兆泥丸中入兆乃口吸神雲咽津三過結作三神一神狀如秀士青錦袍玉束帶二神侍立下入右乳穿絳宫入左膀胱却入右膀胱上穿絳宫入左乳内過肝之後戸順時吐息誦玉經大洞玉經曰太冥絶九玄洞景寄神通玉帝乗朱霄緑霞煥金墉上館雲珠内仰投無玉京山刅峯靈關太漠下靄沬鏡中空冥化混離血神子玄玄叔元母火王瑋寂髙同九父生無極保谷童圓塗無凝滯綺合有臺名九重南披七祖根西解累業凶體嬌萬津波神生攝十方大歸反胎轅三合乗天龍玉清上皇中極寳景王祝曰神安炁洞上與天通越出地戸過度天門隱息四絶七星散分飛行隂鼻孔房日月植根守金藏玉制御萬神仙王何人我巳成眞隱存雌雄玄洞雌一四宫四郷結中有青炁號爲案結神名延昌守曰和結神字嬰理命永長玄歸胎神名固内慶玄血神牢張我日成眞飛仙雲京畢乃口微祝曰天上内音弗育邈散兆生地上外音盻常在法無輪大洞無英公子消魔玉符訣曰當朱書黄繒佩之存呼無英公子内諱名字鎭我左腋之下使玉光内映神明朗清塞斷死孔體合玉靈乃叩齒九通咽液九過太微天帝君道經第五右白元尊神章謹請右白元洞陽君鬱靈標字玄夷絶常守兆右腋之下肺之後戸死炁之門使右腋之下常有金光引神明入六炁之宫七祖父母反胎帝一身登玉房眞思右白元洞陽君鬱靈標眞炁金光之色𦋇於頂上黙呪曰洞陽鬱靈寳䰟生金光煥煥炁中精招眞固神令長生拔出幽根基胎嬰驂晨御氣昇上清次思金光從兆泥丸中入兆乃口吸神雲咽津三過結作三神一神狀如秀士紅錦袍玉束帶二神侍上下入左乳穿絳宫入右膀胱却入左膀胱上穿絳宫入右乳内過肺之後戸順時吐息誦玉經大洞玉經曰太微天帝君泥丸神八浮風入雲營神宗理靈襟龍山秀臺名玉京金房蔚明霞九戸欲孔朗髙瓊黄庭渉北元元父左回明元父字朱精洞陽君名啓明師白素君名幽寥登腎神上清四玄秉元禁長保五帝城玉清大帝君祝曰洞陽鬱靈神名標守體死戸門并出三尸積受入九眞源解胞散滯血百節生正神七祖滅尸旤音祸拔殞後葉患音環黒炁斌來生胞神斫斷胞死根上世受道德後來獲帝先帝先是何人奣音礦明七葉孫乃祖入仙都併坐精上門畢乃口微祝曰天上内音超滯天横冥始地上外音勃沙玄無定力大洞白元尊神消魔玉符訣曰當朱書黄繒佩之存呼白元内諱名字鎭我右腋之下令體映金光神明安寧六炁曜宫七祖反生乃叩齒九通咽液三過三元紫精君道經第六中央司命丈人君章謹請中央司命丈人君理明初字玄度卿常守兆絳宫心房之中血孔之戸死炁之門口吐紫雲之炁洞溢五藏之内使兆心中得神眞之炁絳宫生五色之華眞思中央司命丈人君理明初眞炁紫雲之色𦋇於頂上黙呪曰司命定年丈人保仙度名於南宫上奏帝君前世世爲仙王拔度七葉根福報無窮巳皆是玉經言次思紫炁從兆泥丸中入兆乃口吸神雲咽津三過結作一神羽服仙巾狀如土星下布心内化了心形圎如皎月神坐月内順時吐息誦玉經大洞玉經曰紫精太无中三元上景衢秀朗寳太暉眇眇扇帝九幽敷伯史神名啓三炁素帝靈登玉虚慶炁育五靈司命神明初心神玉清消魔王祝曰㑹元三襟太微小童名交擕領回胎嬰承光弼卿守下關務玄白元君侍月明於是混赤炁君離固籥明車黄炁君受成福延十祖禍散玄生守景六合凌梵玉帝君名七靈共生億千歘昇玉庭嬰兒俳徊羽衣命遷吉濟萬萬福布千千骨有玉映血成瓊泉生樂天地日月同年髙上神霄玉清王祝曰福布七玄前罪滅三塗中靈吹九晨杪納炁太帝北帝宫玉仙擕太一併位重㝠空帝皇太一名遂隱上清室羽明帝一房畢乃口微祝曰天上内音騫苞庭盻猷已澄潧渟此三字是日内名宻誦三遍地上外音幸長劫効萬靈大洞司命丈人君消魔玉符訣曰朱書黄繒佩之存呼丈人内諱名字鎭我絳宫心中五色結絡紫炁生華保神固命長生靈柯七祖解脫去離九河乃叩齒九通咽液三過眞陽元老玄一君道經第七命門桃君章謹請命門桃君孩道康字合精延常守兆臍中之關命門内宫死炁之門使兆臍中徘徊黄雲盈溢三命生根胞結解泄令七世父毋累殃無閡宿罪無滯世世獲度脫上生天帝宫眞思命門桃君孩道康眞炁黄雲之色𦋇於頂上黙呪曰丹靈正神號曰桃君混合生宫守護命門通仙致炁齊景寳雲七祖同歡受福髙晨次思黄炁從兆泥丸中入兆乃口吸神雲咽津三過結作三神一神狀如金甲將軍二神侍立下入絳宫充於命門内宫順時吐息誦玉經大洞玉經曰眞陽舘名帝賔老受事㑹玉皇太道君滅魔除穢水百司詣絳宫逸宅丹玄心宫内五炁結十方七轉司命至三回召仙公太山主鬼者急校三官中髙上神霄玉清王祝曰五嶽眞人定録四賔四門賓友司命促到護籍理民起非神名握節雲拘神名執旛香火八被惡魔絶烟並來對帝萬萬稱臣度我生籍名遷玉門扶翼五老愼護披陳玉清紫微帝君祝曰太上時非子康別名一曰合精延是爲命門王可以召萬神萬神即時到合㑹瓊羽門使令散禍旤絶福連上寢玉堂世爲名仙畢乃口微祝曰天上内音玄幄沙稱福神地上外音無生死入胎門大洞命門桃君消魔玉符訣曰當朱書黄繒佩之存呼桃君内諱名字鎭我臍中之關守固胞根斷絶死炁生血成仙七祖反胎更生南軒乃叩齒九通咽液三過上元大素三元君道經第八泥丸上一赤子章謹請泥丸天帝君上一赤子玄凝天字三元先常守兆泥丸九孔之戸死炁之門使兆泥丸玉堅金曜映眞體生寳光九孔受靈令七祖父母長得安寧解脫宿罪共登上清眞思泥丸天帝君上一赤子玄凝天眞炁寳光之色𦋇於頂上黙呪曰上一赤子號上眞飛雲羽衣曜紫烟上招門景對帝賔寳光奕奕映我身身生羽翼升九天次思寳光從兆泥丸中入兆乃口吸神雲咽津三過結作三神狀如三清紫衣冠下入絳宫穿兩膀胱尾閭穴上入脊髓穿第一椎骨入泥丸内宫順時吐息誦王經大洞玉經曰太素三素母三華炁晨玉清光燈廣靈堂上清房名玉賔表玄籍守命孩道康桃康名徊風散萬魔金符召度卿神名輔衞地戸内保此長生王眞成髙上消魔玉清王祝曰童子景精太微名有神有威合象三形九道相推衣服朱丹歩武嵾嵯出入上元太極内階北極辰星知我者長生存我者不衰人無哭兆恃頼辟非欲知吾處宻問太微太微玉帝三聖徘徊使我左右一合俱飛混洞六府日月齊暉太上玉清王祝曰九道九星轉對五老五神各寜洞陽白元衘籍號曰鬱靈白元君名七世父母反胎更生累葉積罪罪泄福生上入帝室受書丹明書名常與伯史原下一真元王徘徊三界庭巾金佩羽寳曜負形玉輪北回役御朱兵畢乃口微祝曰天上内音明柱子會和存地上外音扶天命登明曜大洞泥丸天帝君上一赤子消魔玉符訣曰當朱書黃繒佩之存呼赤子内諱名字鎭我泥丸之中令死炁沉藏七祖升飛上宴帝堂乃叩齒九通次咽液三過上清大洞眞經卷之二
