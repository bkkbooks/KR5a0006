front:
  text: 上清大洞眞經卷之五荒九
  hash: sha256:e6420b1176283ce81928a1cc630d26c3adb63475bb02e71e91b94dcd485bfb4e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0006_HFL_005-001a, image: hfl/0017/0017-088.png}
body:
  text: 茅山上清三十八代宗師蔣宗瑛校勘太一上元禁君道經第二十五日中司命章謹請日中司命接生君字道靈常守兆左手通眞之戸死炁之門使四大正明玉華保眞魔炁滅絶生神固靈七祖解脫䰟魄更生眞思日中司命接生君眞炁三華之色𦋇於頂上乃黙呪曰四大乗天天元來歸三華吐曜司命景飛爲我招仙七祖散閑上登太虚日月同暉次思三華之炁從兆泥丸中入兆乃口吸神雲咽津三過結作一神狀如太陽星手執太陽下入絳宫入左膀胱入玉莖中入尾閭穴上入第一椎穿泥丸左目頰腮内入肩入臂髓内過入左手通眞之戸順時吐息誦玉經大洞玉經曰太一上元五神安城七轉洞經三徊眞符攝鬼命靈五嶽眞人奉符執經除落死藉刻金金閣書生大帝有教營衞紫房九眞備守五老保關三官司命促對帝言七世絶災玄葉無𠎝種福空同散結旤根髙上消魔玉清王祝曰太一務猷傳召北司玄一老子握節徃來元素無英把符白元洞陽守雌煥然晨光明披霞昇帝墉列坐震靈席混合五日房白炁胞神育上生青君胎神案延昌左擕精上門結神右抱合和嬰節神我生日月華友賔赤炁王日神八景照泥丸朗然洞房眉洞入三寸中嬰兒爲赤子土一赤子混離血神生玉容五道秀金華位爲上清公仙位七祖斷玄滯身得乗神風徘徊三清上和樂反嬰童畢乃口微祝曰天上内音丹明昌左帝根地上外音無常子得大明將車梁大洞日中司命接生君消魔玉符訣曰當朱書青繒佩之存呼司命内諱名字鎭我左手之戸乃叩齒三通咽液三過元靈黄房眞晨君道經第二十六月中挑君章謹請月中桃君名方盈字運梁常守兆右手通眞之戸死炁之門使兆四運通明三神固精保鎭萬炁與神長寧眞思月中桃君方盈眞炁月暉之色𦋇於頂上乃黙呪曰元靈黄房内月君號方盈左宴朱嶺臺右擕仙皇庭寢景三秀房結我始生神同飛入玄玄七祖反華嬰次思月暉之炁從兆泥丸中入兆乃口吸神雲咽津三過結作一神狀如太隂星手執太隂下布絳宫入右膀胱入玉莖中入尾閭穴上入第一椎穿泥丸入右目頰腮内入肩入臂髓内過入右手通眞之戸順時吐息誦玉經大洞玉經曰元靈黄房乳中内中有黄寧童命門神左有堅玉君骨神右有帝昌皇腦骨神浮清翳晨炁蔚蔚虚靈容青肝明輪子肝神開朗徹八牎太一疇丘蘭斗中文女奉符入玉宫拔我七世罪迴元期五通混合帝一室五老變孩蒙太上晨景玉清王祝曰九元鎭眞五老纒綿日月中王與兆爲親太混三五離落魄䰟百節金映玉液回神五府生華白炁運烟充溢三清紫房寳津上開仙戸下塞死門令我羽籍玉帝之前七祖父母反生南軒虎服攝魔龍旌命神太一錦旄招束三官除滅死籍刋名玉眞天帝號保生太上日月同年畢乃口微祝曰天上内音變世炁三道遷地上外音理命非幸連劫太洞月中桃君方盈消魔玉符訣曰當朱書青繒佩之存呼桃君内諱名字鎭我右手通眞之戸乃叩齒三通咽液三過太極主四眞人元君道經第二十七左目童子章謹請左目童子名飛靈字陽光常守兆左目死炁之門使兆陽生於内清潔於外二炁交通四朗八㑹徹見無方萬神自泰眞思左目童子飛靈眞炁日華之色𦋇於頂上乃黙呪曰四極太靈元君精瑛日華充溢童明流光二景相照通我明梁三丹啓眞我道開張翠羽羅裙飛上玉京次思日之華光從兆泥丸中入兆乃口吸神雲咽津三過結作一神狀如太陽星手執日光下布絳宫穿玉莖中入尾閭穴入脊髓上入第一椎穿泥丸入左瞳人内摇睛七過不得動右睛順時吐息誦玉經大洞玉經曰太極主四眞凌羽逸上清七轉召司命太一揚威明司録促詣位三舉登震靈方丈符魔王來受事仙官束鬼精日中青帝毋號曰芬艷嬰太張黄素上五符安來紫素上玉名混化六合内洞房列火兵去兆死籍名遷玉門東華帝一保身五老衞神上登太明天國金輪霄玄太上髙晨玉清王祝曰我乗混合炁纏固九眞丘養光脾神太昌子駢羅凝羽珠九尊衆帝生九帝子洞景徊須㬰七祖結解散穢積忽巳除世世生福昌玄玄獲仙書身昇太霞宫控龍宴玉虚上朝上清皇寢興幸正扶斗中内妃畢乃口微祝曰天上内音登來張乗法謨地上外音靈壽臺宜生人大洞左目童子飛靈消魔玉符訣曰當朱書黄繒佩之存呼童子内諱名字鎭我左目之瞳乃叩齒七通咽液七過四斗中眞七晨散華君道經第二十八右目童子章謹請右目童子名晨嬰字隂精常守兆右目死炁之門使隂映内朗陽觀外明三晨同煥徹見玉清眞思右目童子晨嬰眞炁月華之色𦋇於頂上乃黙呪曰七晨飛華華散三光混合成眞上招月䰟爲我降靈啓我仙門七祖同飛上朝帝君次思月之華光從兆泥丸中入兆乃口吸神雲咽津三過結作一神狀如太隂星手執月光下布絳宫穿玉莖中入尾閭穴入脊髓上入第一椎穿泥丸過入右瞳人内摇睛七過不得動左睛順時吐息誦玉經大洞玉經曰斗中四眞四斗人散華玉清臺帝卿仲玄生天帝之佐一徊衆眞來香風扇三寳五藏映青夷宫名天帝奏仙拔擢七玄種死成樹沉絶胞根太一揮風號曰寄頻太一字斷絶血穢斬伐注烟白帝西華白帝字爲我北神髙上神霄玉清王祝曰三素牢張上老君神生道三素字固我魄逸遊保兆六合腦憂苦没曲門死炁閉地下身與帝一君併襟樂六府鑑心丹玄房熈炁泥丸野體耀金暉羽籙召眞白炁重鬱百神光鮮長與日月符籍纏綿世保道德永爲天仙寂寂内注遂升帝晨畢乃口微祝曰天上内音鮮曲玄鏡重車地上外音長濟樂脫憂苦大洞右目童子晨嬰消魔玉符訣曰當青書黄繒佩之存呼童子内諱名字鎭我右目之瞳乃叩齒三通次咽液三過晨中皇景元君道經第二十九肺部童子章謹請肺部童子名素明字無映常守兆肺部之下五關死炁之門使玄暉充徹華蓋上精神室有光五關太明萬魔不入百神受靈眞思肺部童子素明眞炁五關輝光𦋇於頂上乃黙呪曰童子素明黄雲九纏滄臺飛輪三神恊眞號曰玄上景列位髙王賔緫攝命百神擕我入紫烟次思暉光從兆泥丸中入兆乃口吸神雲咽津五過結作五神狀如孩童下布五藏上充華蓋入鼻凹五色神雲分入兩目左三右二摇睛九過順時吐息誦玉經大洞玉經曰晨中黄景炁三秀山名登霄庭滄臺飛羽輪迎延符名道巳成司命奉帝書號爲玄度卿司命字保生太霞宫列賔舘上清命門合精延守我身黄寧左擕元素君右攝朱鬱靈髙上消魔玉清王祝曰二老在左右方帝䰟不可不分三九變其上下太一立其中根五神奉我生籍司命塞我死門九宫合而爲一六合緫而内眞世獲仙書福慶纏綿五老對席日月爲親太一來迎上昇帝晨七祖滯血皆爲拔根反胎南宫受生帝軒兆宴玉堂同襟帝輪世世列圖羽服揚旙子子保昌慶及後玄長爲仙伯役使萬神畢乃口微祝曰天上内音緫命本登龍津地上外音玄劫㑹萬履阿大洞肺中童子素明消魔玉符訣曰當朱書黄繒佩之存呼童子内諱名字鎭我肺部之户神安室府魔炁滅䘮乃叩齒三通次咽液三過金闕後聖太平李眞天帝上景君道經第三十胎中白炁君章謹請胎中一元白炁君務玄子字育上生太一精䰟玄歸子字盛昌共守兆五藏之上結喉本戸死炁之門使三華之炁入帝一之府九明之津生六胎之下九玄散旤七祖解結身登玉堂位列太一眞思胎中一元白炁君務玄子太一精䰟玄歸子眞炁三華之色𦋇於頂上乃黙呪曰金闕煥玉清白炁映丹霞明光鬱金靈五色吐三華流津宴寢堂結我始生芽五符召百神威章徴萬魔保此億劫仙道明無凶邪次思三華之炁從兆泥丸中入兆乃口吸神雲咽津三過結作三神白炁君白衮冕二神侍立下布結喉之本戸順時吐息誦玉經大洞玉經曰金闕上景炁十方輝紫烟三命太一帝五召太平神外神七轉招嶽眞玉符告三官拔籍三靈下三官府受生髙上晨太帝八靈王陽堂玉字一化回慶玄桃君守六合勒精帝卿字衞泥丸震靈符名攝魔三舉符名登壇所召促到混離對陳無令上帝告察凶奸太上消魔玉清王祝曰天生八炁迴合帝郷五神奉符司命扶將拔斷死籍盪穢幽冥七世解結延福玉庭血積沉没三素黄紫白煥清兆昇天堂與帝合靈世得仙契所感必成種年日中植命月庭反胎童蒙目爲孩嬰生與天同夀與日并畢乃口微祝曰天上内音暉延勒得日賢地上外音籍㑹元帝符子大洞胎中一元白炁君消魔玉符訣曰當朱書黄繒佩之存呼白炁君内諱名字鎭我五藏之上七祖解釋消結滅罪乃叩齒二通次咽液二過太虚後聖元景彭室眞君道經第三十一結中青炁君章謹請結中青炁君案延昌字合和嬰元君精䰟保谷童字明夫共守兆五藏之下大胃上口死炁之門使金液流布玉華映䰟神飴溢於窮腸帝炁充於九關釋七祖於玄幽更受胎於南仙上葉解結下胞脫根眞思結中青炁君案延昌元君精䰟保谷童眞炁玉華之色𦋇於頂上乃黙呪曰離合九靈二眞幽密太虚重天上擕太一雌雄混合同仙妙室上變九仙下解胞結七祖慶忻五苦解脫使我飛騰靈化本質次思玉華從兆泥丸中入兆乃口吸神雲咽津三過結作三神一神青衣二神侍立下布五藏之下大胃上口順時吐息誦玉經太洞玉經曰太虚空無景山名霞中有彭室帝君室九雲合重扉帝君靜幽密八眞下關神合景君上擕女斗中妃太乙雌雄混玉房九變還得七分形散六合泥丸易分别脾神養光肺神梁南書我五符刋玉刻金生華日茂死炁月沉拔尸於胃受眞於心旤害㝠散七祖樂欽髙上神霄玉清王祝曰種福九天外拔尸地門下七玄解滯積斷樹除憂苦反胎朱火宫更生九玄戸眞炁日日臻旤害日日除兆昇三清堂乗飈上景庭命與月毋俱年隨日帝生累世保仙籍回老更童嬰福昇六合内受圗永長生畢乃口微祝曰天上内音乗元輪入幽宗地上外音禍車滅養無景大洞結中青炁君消魔玉符訣曰當朱書赤繒佩之存呼青炁君内諱名字鎭我五藏之下使玉華映䰟七祖受生南仙乃叩齒三通次咽液二過太玄都九炁丈人主仙君道經第三十二節中黒炁君章謹請節中黒炁君斌來生字精上門帝眞精䰟幽臺生字觀上生共守兆九腸之口伏梁之下戸死炁之門使太玄之炁布散腸内太一之神徊行百節令兆體有金光面有玉澤七祖父母得解㝠罪累葉之先世世解結上生帝房入保飈室眞思節中黒炁君斌來生帝眞精䰟幽臺生眞炁玉光之色𦋇於頂上乃黙呪曰太玄何寥寥黒炁生上靈帝眞洞明景九炁合神廬變化咄嗟頃倐忽肇明初萬眞鍊我仙百關自靖居七玄斷胞樹九曽登福墟上招景中子與我登雲輿次思玉光從兆泥丸中入兆乃口吸神雲咽津二過結作二神黒衮冕下布九腸之口伏梁之下戸順時吐息誦玉經大洞玉經曰太玄九炁上烟迴太暉間神光秀空峯山峯五道煥三天駕景登絶霄乗風蕩滯神中一曰運珠心神理心入清閑混合三五宫累變億萬千伐絶胞樹生四斷血尸根七祖散積結反華黒幽玄髙上神霄玉清王祝曰帝䰟照無阿帝䰟名常鎭兆生門伏尸滅落保魄寧䰟玄毋回光隂神奉帝玉仙右命太一乃及兆身北宴上清列爲玉賔命生日華年合月烟長躋金房晨景爲隣除憂伏胃門拔苦三途中福積丹玄内玉女赤子慶充泥丸房百神混帝一大慶流回風反兆朽艾形攺貌爲嬰童世世入仙臺玄玄登羽宫大劫雖屢傾與日方増崇畢乃口微祝曰天上内音無阿累奉神冲地上外音見玉賔拔戀塗大洞節中黒炁君消魔玉符訣曰當黒書青繒佩之存呼黒炁君内諱名字鎭我九腸之口使太上之炁充散九府太一眞神迴行關戸玉光生體保生玄母七玄受慶反形幽腐乃叩齒五通次咽液五過洞清八景九玄老君道經第三十三胞中黄炁君章謹請胞中黄炁君祖明車字神無極天帝精䰟理維藏字法運珠共守兆小腹之内二孔之本戸死炁之門使日月之根生於二戸之下五帝之炁充於極隂之宫精華盈滿玉液塡溢七世之父母反胎宿對之殃䰟解結上生南宫神仙受炁眞思胎中黄炁君祖明車天帝精䰟理維藏眞炁黄雲之色𦋇於頂上乃黙呪曰上清曜玄臺八景乗天紀黄炁恊神眞精䰟對帝子太一度命籍五符固不死擕仙帶晨暉徊風反形始拔苦出七祖同歡九玄裏次思黄雲從兆泥丸中入兆乃口吸神雲咽津二過結作二神黄衮冕下布小腹之内二孔之本順時吐息誦玉經大洞玉經曰上清絶霞外八皇運八老君九天九宫幽寥重冥空字生帝子上歸字擕此景中人向制晨登大老寢大老寢室夕宴金華山名便羽節命太一錦旗招萬神堅我六府胎伐滅胞樹根解結生七祖散旤寜九玄赤帝丹靈曰帝峙扶兆入玉門月母靈素蘭守閉死炁門太上消魔玉清王祝曰白雲合神景乗素㑹太微上朝帝一室解帶皇一階太一之上啓明四素君金門臍中三陽眞四召上歸䰟女昇我身内神覆蓋太明威太寳九華光映兆形招雲混眞散香要靈月中反胎日中受生年停曜景命遂無傾身爲仙王保此玉清世受眞書玄華玉庭畢乃口微祝曰天上内音映遂劫度連絶地上外音濟寒熱得全炁大洞胞中黄炁君消魔玉符訣曰當黄書白繒佩之存呼黄炁君内諱名字鎭我小腹之内二孔之本七玄之祖上升帝室乃叩齒三通咽液三過東華方諸宫髙晨師玉保王青童君道經第三十四血中赤炁君章謹請血中赤炁君混離子字叔寳堅司命精䰟發紐子字慶玄共守兆百關之穴絶節之下死炁之門使五帝之液盈於六府九靈之潤充於血肉絶節不空地門塡塞七祖結散更生南極兆得玉仙合道保德眞思血中赤炁君混離子司命精䰟發紐子眞炁赤雲之色𦋇於頂上乃黙呪曰晨景煥東霞丹景映髙清二眞恊神宗落落七華生五老飛帝席太一保童嬰錦雲曜幽夜朗朗開重㝠七祖勒符籍南極受胎靈髙晨盻雲輿運我昇飛軿拔解億世基同歡萬劫程次思赤雲從兆泥丸中入兆乃口吸神雲咽津七過結作七神下入絳宫六神狀如力士分左右各三下布兩脚絶骨之戸一神狀如赤帝下入尾閭穴上穿泥丸充入髮際之戸順時吐息誦玉經大洞玉經曰東華青宫發始暉髙晨青童君映上清煥洞圎珠蔚曰名朗朗紫曜明七神回帝席五老飛玉軿太一景中立司命攝萬精汎然雲波間寂盻泥丸城七轉召三官北君冥官啓首靈五嶽應炁到拔死書長生三舉震丈符玄解大魔精七祖散血結玄華保黄寧髙上消魔玉清王祝曰五道混回七門白帝門始分南和赤帝建節白帝彰安靈標肺神理魄㑹昌護神奉符登霄寢息玉軒定録瓊禮世爲天仙三塗塞絶除伐胞根死炁沉零禍輪無連福臻重枝慶㑹華玄名書玉堂内世爲道德門畢乃口微祝曰天上内音觀軒寢明賔鬱地上外音三生連虚無中大洞血中赤炁君消魔玉符訣曰當朱書黄繒佩之存呼赤炁君内諱名字鎭我百關之穴使靈液盈充玉澤流溢死炁斷絶神固孔節七祖各散宿根咸滅乃叩齒三通次咽液三過上清大洞眞經卷之五
