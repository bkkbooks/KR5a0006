body:
  text: 茅山上清三十八代宗師蔣宗瑛校勘扶枽大帝九老仙皇君道經第三十五上玄元父章謹請上玄元父髙同生字左回明下玄玄毋叔火王字右回光帝皇太一重冥空字幽寥無九帝尊神日明眞字衆帝生太帝精䰟陽堂玉字八靈天帝九關䰟緑徊道字絶冥天紀帝䰟照無阿字廣神七神常守兆本命之根胞胎大結常令胞囊玉明胎結開清七祖反胎兆命長生三天同符上與日并祐我死炁三十九門太一尊神備守致眞口衘日光手執月明照兆死戸使兆長生我體自在常誦洞經金音令仰充上入太無庭解結散禍積披脫七祖靈反胎會南宫仙都有玉名三塗滅罪根輪轉登上清眞思混合蓮華七色神雲𦋇於頂上乃黙呪曰元父玄毋七眞齊炁神公太帝九老併位爲我固生拔度十界日月同符九帝合契坐命天魔萬靈來拜浮景三舉上震文保億世次思七色蓮華之炁從兆泥丸中入兆乃口吸神雲咽津七過毎念一名則咽一過先念元父次玄毋次帝皇次九帝尊次大帝精䰟次天帝九關䰟次天紀帝䰟結作七神布心下臍上上玄元父衮冕騎獅子六人衣冠侍立順時吐息誦玉經大洞玉經曰太帝九老京山名校仙登扶桑七轉召天帝司命乗神綱五嶽啓靈戸傳聲大魔王河海皆受事立爾應㑹方臺名保符泥丸内守神曰桃康徊明陽神易死籍記仙隂神叔火王拔絶三塗疾去旤生上英精液君七玄登朱室兆身㑹玉堂上友方盈子右子神下擕理維藏精䰟左攝明車君黄炁君右輔歸盛昌太一别子混一玉京炁化兆反嬰童髙上消魔玉清王祝曰太玄聚暉映冠扶晨大帝變景須㬰混分入兆五府堅我玉根雙軿太一合羽揚輪與兆上昇回轉金門年同日德體得金仙世世昌盛眞符流連玄玄累葉名書靈軒羽籍紫庭飛香奏烟福連百枝慶流溢門畢乃口微祝曰天上内音盈劫連邕玉昇地上外音車離苦去百毒大洞上玄元父消魔玉符訣曰當青書白繒佩之存呼元父内諱名字鎭我本命之根乃叩齒七通咽液七過小有玉眞萬華先生主圖玉君道經第三十六二素老君章謹請三素老君牢張上字神生道正一左仙仲成子字西華正一右仙曲文子字靈和常守兆鼻下人中死炁之門使兆人中眞一撫閑於紫房靈炁金光散曜於子戸三晨併位於緑室七玄超生於玉堂七祖受福上昇南宫眞思三素老君牢張上正一左仙仲成子正一右仙曲文子眞炁混九玄白黄三色之雲𦋇於頂上乃黙呪曰玉眞生帝景萬華乗雲發三老輔二仙共鎭死戸窟神映七華生朽骨蒙更蛻超逸三界庭五苦咸解脫得入九天表上朝髙朱日次思三色之炁從兆泥丸中入兆乃口吸神雲咽津五過結作五神三老君青黄白三色衣及二星官共五神下布絳宫穿尾閭穴穿脊骨上入泥丸下布鼻下人中之戸順時吐息誦玉經大洞玉經曰玉眞萬華宫宫名髙仙藏帝經主圖九天表洞觀無中生七轉召萬神五嶽一來庭三宫招衆魔司録校所呈拔籍重泉曲記仙書上清七世解牢結穢血悉沉零反胎朱火室更受洞中生伯史丹田神衞神軀令我保黄寜髙上神霄玉清王祝曰命門合精六混七分太一把籍司命理神帝一固形無英守䰟大回紫房奉符帝君胞樹伐絶斷滅血根七玄更起沉景生烟兆得上昇化合帝晨身映日月命與天連重華累暉咸會上尊世書靈羽籙名紫籙内宣乘景三素北宴髙元號曰仙王上清眞人畢乃口微祝曰天上内音合帝伯方超凝地上外音理生來福田延大洞三素老君消魔玉符訣曰當黄書白繒佩之存呼老君内諱名字鎭我鼻下人中備衛我身身得長存我形昇飛七祖皆仙上登南宫奉謁帝晨乃叩齒三通咽液三過玄洲二十九眞伯上帝司禁君道經第三十七五帝章謹請北方黑帝保成昌字北伐守兆兩膀胱之中西方白帝彰安幸字西華守兆隂囊之中南方赤帝長來覺字南和守兆口舌之内東方青帝彫梁際字青平守兆五藏之外中央黄帝含光露字中細守兆脾胃之中玄一老子林虚夫字靈時道守兆隂莖之端一老五帝備衞本命守兆身形使七祖解考福祚九玄宿罪解結散除胞根即使胎精血光化爲金液玉泉上生南宫以爲帝賔我入八景回駕瓊輪仰升九天白日飛仙眞思五色神雲𦋇於頂上黙呪曰五帝明眞輔仙玄伯上帝景暉吐靈敷席翳翳神曜徘徊重羃羽景寳録太一命籍五炁緫䰟三精固魄金仙練容停年反白拔出幽根日月同宅次思五色之炁從兆泥丸中入兆乃口吸神雲咽津分作六過毎一咽結一神第一咽北帝黑雲下布左右膀胱之中出於後心二咽西帝白雲下布隂囊之中出於右肩神頂戴月光三咽南帝赤雲下布口舌之中出於髮際下一寸四咽東帝青雲下布五藏之外出於左肩神首戴日光五咽中帝黄雲下布脾胃之中出於臍中六咽玄一老子亦黄雲下降隂莖之中出於玉龜之外順時吐息誦玉經大洞玉經曰玄洲絶三津羽景大無庭迴霄飛重漠委化混萬精五雲五行炁鬱絶空七霞七星光落圓明朗朗幽寥子梵昌心神濟黄寧五老揮絳華散香擕五靈金質濯帝川緑烟藹流瓊神拔三塗積仙胎纒兆形太上玉清眞王祝曰上寳月九眞日曦變玉室呼吸紫微大混帝一八烟藂生百靈明威九䰟離合三光同暉天皇上丹神在元紫烟霏霏五神奉圖始命不虧變入九宫被服朱衣腰佩虎章流雲繡帔帷帳瓓玕五色徘徊日月照察挾以東西神庭舌上内醴以除渴飢三五復反轉藏營斗璣周流太一生均二儀髙上神霄玉清王祝曰太一變六合五神哺泥丸七精滅三塗血尸塞下關三衿對帝眞拔斫胞樹根丈人號神宗同心元素君天皇入太清五老捧符文世世登羽宫重華日中軒元王始明精固我本命門保弼下元卿運緑炁歸上谷下玄弼卿字玄景映形神朝躋太上輪日月併玉衿年隨二景分丹書玉堂内位爲天上君上清仙左擕羽臺子右提金顔仙畢乃口微祝曰天上内音開神華太紀元地上外音三毒除福乗回大洞五帝消魔玉符訣曰當黄書白繒佩之存呼五帝内諱名字鎭我全身之戸乃叩齒五通咽液五過太元晨中君峨眉洞室玉戸太素君道經第三十八帝卿章謹請泥丸上一帝卿肇勒精字仲玄生絳宫中一輔卿中光堅字四化靈黄庭下一弼卿歸上明字谷下玄三神衛兆入帝一之室保於九天之録死戸滅絶超登帝一眞思泥丸上一帝卿肇勒精絳宫中一輔卿中光堅黄庭下一弼卿歸上明三眞之炁混合青白黄三色之雲𦋇於頂上乃黙呪曰三眞生太無玉戸映晨霞太素洞元虚丹靈森朱阿回神九重府内唱發瓊華百關納津液停年秀三柯我身騰玉清七祖離幽都長保不終劫萬世爲仙家次思三色雲炁從兆泥丸中入兆乃口吸神雲咽津三過結作三神下本身三宫本命帝室出自心下一寸順時吐息誦玉經太洞玉經曰太无太素洞景幽玄人生天形上道泥丸九宫森羅丹樓丹田宫五間嬰兒六炁盈潤清淵太一凝血司命鎭䰟桃康備魄養光命門公子携精洞陽迴神九眞保骨太素理眞百節萬液千門開關上憇日月五帝九晨淡寂五藏華生玉根胃宫朱腸生血通源三命長生營護太全兆得神名昇爲仙君髙上太素玉清王祝曰帝一混九玄太素五華精寳羽宴玉堂八風扇太明髙上乗元景凌梵履昌靈七化紫戸下九混五帝清體生六色曜金映流神形感濯元炁内金書玉皇庭太上晨景玉清王祝曰靈雲始分白炁鬱素混㑹九玄三五流化帝一解形超登霄路太一呼吸五華堅固司命主日中白元司曰暮日中靜心心玄眇悟夕隱泥丸百神宣布二宫可以長生心腦可以長度畢乃口微祝曰天上内音凌昌玉百塗君地上外音得合契登神郷大洞三一帝郷消魔玉符訣曰當朱書黄繒佩之存呼三卿内諱名字鎭我本命衞我帝室固録九天死戸絶滅乃叩齒三通咽液三過九靈眞仙母青金丹皇君道經第三十九帝一尊君章謹請大洞帝一太素尊靈父寧母精二合雙成百眞大混一徊始生身結入烟變胎元嬰日月寳光洞我軀形太一在上與帝合并泥丸保玉五藏華明長合日月手執洞經位爲仙公晨昇上清三十九章金符羽庭眞思大洞帝一尊君父寧在眞炁五色紫雲之炁𦋇於頂上乃黙呪曰九靈通妙化金仙混扶桑帝一變百神合靈西丹皇上爲胎仙母下號理神宗曜景絶雲杪蕭蕭紫微宫爲我執命籍保眞三素房妙景空中降鍊我反嬰蒙七祖絶苦源超逸九福堂次思五色紫雲從兆泥丸中入兆乃口吸神雲咽津十二過結作一神身披五彩紫白霞圎光輪神在光内下布一形之内散炁九孔之中聚在舌尖之上順時吐息誦玉經大洞玉經曰西元九靈炁崑崙山金丹流雲宫王母宫名上極旋曜杪暉景太霞中動迴九天斗輪靜沉八流剛水輪底室有胎仙母擕衿太帝皇玄一靈時生玄一老子三老素牢張左把兆符籍右擕理神宗同登琳龍闕稽首玉清房拔棄死滅根養形三五中七祖解尸結受福明朱方髙上神霄玉清王祝曰太上洞明飛景九天結精凝炁化炁變神司命混合散形億分千乗火甲萬騎揚旛俱與太一上造帝先𠇂無帝君起非帝佐仲成丹田神曲文一合我炁再合我神三合我魄四合我䰟五合我精六合我身我身六合洞靈啓眞八景虚駕三素浮輪我與帝一俱升玉晨重華累枝混合天仙身有道籍世有生根金簡羽符名刋日軒所願即從天禄詵詵所向如心萬福盈門常存太上帝一泥丸雌雄混化百靈纒綿讀經萬遍雲駕來迎擕宴五帝日月九君得爲仙公上清眞人畢乃口微祝曰天上内音極炁壽受乗明地上外音合伯衿駕變劫大洞帝一尊君消魔玉符訣曰當紫書黄繒佩之存呼尊君内諱名字徊風混合結成道眞把籙符籍度命長延千變萬化昇入九玄七祖解脫反胎三天與帝同休舉形皆仙乃叩齒三十九通咽液三十九過徊風混合帝一祕訣兆誦詠玉經三十九章都畢叩齒三十九通便閉兩目存此百神變成白炁混沌如白雲之狀從玄虚中來入兆口中鬱鬱良久覺白炁從下部出又從玉莖中出從兩脚底出又從兩手心出冠纒一體上下手足混合一身與白炁同烟上下不相見也良久白炁忽復變成紫雲鬱鬱從口中入頭中并五藏之内充滿腹内良久紫雲又從兩脚底兩手心下部玉莖中出冠纒一體鬱然上下與紫雲合形不相見也須曳存見紫雲之炁充滿左右及一室内又存見口中出風炁吹扇紫雲之煙乃徊轉更相纒繞忽結成一眞人男形如始生小兒身長四寸號曰大洞帝一尊君名父寜在字合母精延守兆死關衆神徊風混化共成此帝一尊君其尊君來入兆口中舌下逕上昇入紫房六合宫中平坐向外尊君左手把兆五符右手把兆五籍尊君口左邊有日光徑九分口右邊有月光徑一寸尊君口吐徊風之炁吹此日月之光皆鬱鬱變成白色或成紫色令光炁下入兆五藏六腑百節一身之内洞徹朗然内外如白日之狀良久忽然忘身事訖神炁已定覺身體輕清精神開爽乃叩齒三十九通兩手拭面再說頌曰太上教授我讀誦洞眞經玉音含金商上充太無庭解結散幽禍拔脫七祖靈返胎㑹南宫世世有玉名三塗滅罪根輪轉昇上清誦經畢復爐祝曰具位臣某吉日入靖修誦上清大洞三十九章眞經巳畢當願仙靈仙官金童使者五帝五嶽神仙眞人三天正神左右龍虎君天仙地仙五靈香官侍經威神當令臣召致十方正炁自然生金液丹碧芝英九玄玉眞交㑹齋堂之所同灌臣身令臣學道得道求仙得仙飛行太空騰景九天玉童玉女侍衛香烟關奏臣向來所啓所願逕達髙眞玉皇上道萬聖御前復畢心拜四方乃起後序易曰大㢤乾元萬物資始又曰乾道變化各正性命保合大和乃利貞先儒釋之曰何謂元是不可言也其隂陽未形之初乎天之所賦爲命物之所受爲性性命妙矣保合大和而後能利正大洞一經其本乎迴元復命世之議者皆曰道妙於虚無神潜於歘有殊不知未有天地先有此道洙泗門人之稱夫子曰性與天道不可得而聞也蓋此道即惟精惟一之妙自堯舜禹三聖相傳皆心心符印未嘗須㬰離也迨至春秋世降俗末指爲甚髙難行之事無所適從故夫子亦罕言之及其顔子坐忘曽子一唯豈復有異聞乎是經之㫖乃存心養性以事天聚精㑹神而合道與夫子操則存舍則亡之說初不相背頃自中央黄老君隱禁之後世亦無知者故人間地上五嶽山中永無此經後世之人莫聞大道恣情欲海汨志塵波夫其所謂保太和正性命者良可憫也茅山上清宗壇歷代傳授千餘歳間纔三十八人蓋其發天地未形之藴析父母媾精之妙故宜隱祕不輕𢌿傳咸淳仲春玉海冲妙宗師來游九華因訪道室語及此事聞者幾希懼將泯絶欲廣其傳焉公端以三生結習之縁蒙師指教感恩莫酬敬命厥工用鋟諸梓以承其志與天下學士共之必有賫寳効心盟天而傳者願力行之以昌此道咸淳壬申上元日嗣法程公端焚香敬書性命之賦於物也至大至微至輕至重有無不可涯涘而其不遺於道悉可見可求矣故得夫巳者明然後知天地萬彚皆一物也彼之虚靈神妙者吾豈不具之旣具之則可見可求曷不與至大至微至輕至重者同所賦有而不昧焉道之所謂經者發乎天眞之音三炁之文莫不由上帝眞仙宣演而後傳之下世也其音聞於無音其文質於無文判於溟涬混沌之始而其開廓生植之著則可聞可質矣謂之經也啓已之藏說巳之經發其至眞之奥以開人之頑蔽豈不物物具夫此經也㢤大洞眞經凡三十九章皆修鍊之㫖行之而有成者若魏楊郭許者是也其隱乎髙虚逹乎明徹或謹於禮謁或頥於采服工用各有同異非可泛易求之蓋脩錬之道必本於養炁存神逐物去慮然後炁凝神化物絶慮融無毫髮之間礙而後復乎溟涬混沌之始故不飢渴不生滅與雲行空躡者遊於或徃或來而莫知其極也經之行世敬善之士必思廣其傳原其存心於善一也閩道者熊常一求道有年募工刋是經來請一言噫知經之爲道而從之也衆矣能行經之道是不徒從之也太上之設教蠢動之類莫不受其澤行之千萬世而不息者有自來矣其幾何人能信於巳而力修之能信而修之何患其不得乎經也矧出乎有無涯涘之表而神妙不特乎經之謂也持經者尚當勉於余言乎正一嗣教道合無爲闡祖光範眞人領道教事四十三代天師張宇初謹書上清大洞眞經卷之六終
